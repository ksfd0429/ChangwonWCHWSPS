<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Changwon 2026 WCH NPC Portal by LOC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#EAF1F7;--panel:#ffffff;--panel2:#F1F6FA;--line:#CBDBE8;--mut:#5D758B;--txt:#13314C;--acc:#1B6FA8;--g:#2E8B57;--y:#E87722;--r:#C94A3D;--navy:#16456B;--blue:#1B6FA8;--green:#2E8B57}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
header{background:var(--navy);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
header img{height:34px}
header h1{font-size:15px;margin:0;color:#fff;font-weight:700}
header .sp{margin-left:auto}
.wrap{max-width:900px;margin:0 auto;padding:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(19,49,76,.08)}
.card h3{margin:0 0 10px;font-size:15px;color:var(--navy)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{background:var(--acc);color:#fff;border:0;padding:12px 16px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;min-height:44px}
.btn.sec{background:#fff;border:1px solid var(--line);color:var(--txt)}
header .btn.sec{background:transparent;border-color:rgba(255,255,255,.4);color:#fff;min-height:0}
.btn.g{background:var(--g)} .btn.r{background:var(--r)} .btn.y{background:var(--y)}
input,select{background:#fff;border:1px solid #B7CCDD;color:var(--txt);border-radius:11px;padding:11px 12px;font-size:14px;width:100%;min-height:44px}
input:focus,select:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 2px rgba(27,111,168,.22)}
label{display:block;color:var(--mut);font-size:11px;margin-bottom:3px}
.f{margin:10px 0}
.muted{color:var(--mut)}
.tag{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px}
.tag.g{background:#DDEEE3;color:#1F6B42} .tag.y{background:#FBE8D8;color:#B4550E} .tag.r{background:#F7DDD9;color:#A93226} .tag.b{background:#DCEAF5;color:#1B6FA8}
.tbl{overflow:auto;border:1px solid var(--line);border-radius:10px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;white-space:nowrap}
th{background:var(--navy);color:#fff;font-weight:600}
.tiles{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:620px){.tiles{grid-template-columns:1fr 1fr 1fr}}
.tile{cursor:pointer;background:#E7F2EA;border:1px solid #A8CDB4;border-radius:14px;padding:14px 16px;min-height:72px;display:flex;align-items:center;gap:14px;transition:border-color .15s}
.tile:hover{border-color:var(--g)}
.tile b{font-size:15px}
.pictbox{width:52px;height:52px;border-radius:13px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.arr{margin-left:auto;color:var(--y);font-weight:800;font-size:20px}
.tile.locked{opacity:.42;filter:saturate(.55);cursor:not-allowed}
.tile.pulse{animation:tilepulse 1.1s ease}
@keyframes tilepulse{0%,100%{box-shadow:0 0 0 0 rgba(214,58,47,0)}30%{box-shadow:0 0 0 8px rgba(214,58,47,.45)}60%{box-shadow:0 0 0 3px rgba(214,58,47,.25)}}
.mback{position:fixed;inset:0;background:rgba(10,25,40,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;width:100%;max-width:500px;max-height:92vh;overflow:auto;border-radius:18px 18px 0 0;padding:0 16px 24px;box-shadow:0 -6px 30px rgba(0,0,0,.25)}
@media(min-width:620px){.mback{align-items:center}.modal{border-radius:18px}}
.mtop{position:sticky;top:0;background:#fff;display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--line);z-index:2}
.mnav{width:44px;height:44px;border-radius:50%;border:1px solid #B7CCDD;background:#fff;font-size:18px;color:var(--acc);cursor:pointer;flex-shrink:0;font-weight:700;transition:opacity .25s}
.mnav:disabled{opacity:.25;cursor:default;color:#5D758B}
.msec{font-size:11px;font-weight:700;color:#5D758B;letter-spacing:.5px;margin-top:10px}
.sect2{font-size:11px;font-weight:700;color:#5D758B;letter-spacing:.5px;text-transform:uppercase;margin:14px 0 2px}
.strow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 4px;border-bottom:1px solid var(--panel2);font-size:13px;cursor:pointer}
.strow:hover{background:var(--panel2)}
.center{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center}
.box{width:380px;max-width:94vw;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px 24px}
.box .logo{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.box .logo img{height:48px}
.doc{background:#fff;color:#111;max-width:760px;margin:0 auto;padding:40px 46px;border-radius:6px;font-family:"Times New Roman",serif;position:relative;overflow:hidden}
.doc h2{text-align:center;letter-spacing:1px}
.doc table{color:#111;font-size:13px}.doc table th,.doc table td{border:1px solid #999;background:#fff;color:#111}
.wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5}
.wm span{font-family:"Arial Black",sans-serif;font-size:74px;font-weight:900;color:rgba(214,40,40,.16);letter-spacing:-4px;line-height:.92;text-align:center;border-top:8px solid rgba(214,40,40,.16);border-bottom:8px solid rgba(214,40,40,.16);padding:10px 0;transform:rotate(-28deg) scale(1.1,1.4)}
.err{color:#C0392B;font-size:12px;margin-top:8px;min-height:14px}
.hide{display:none}
.slotwrap{position:relative;height:118px;margin-top:18px;width:100%}
.slot{position:absolute;left:50%;top:50%;transition:transform .28s,opacity .28s}
.fimg{width:108px;height:76px;border-radius:10px;border:1px solid rgba(0,0,0,.2);box-shadow:0 4px 14px rgba(0,0,0,.18);background:#DCE6EE;overflow:hidden;display:flex;align-items:center;justify-content:center;line-height:1}
.fimg img{width:100%;height:100%;object-fit:cover;display:block}
.sl0{transform:translate(-50%,-50%) scale(1);z-index:6;opacity:1}
.slm1{transform:translate(calc(-50% - 96px),-50%) scale(.58);z-index:5;opacity:.55}
.slp1{transform:translate(calc(-50% + 96px),-50%) scale(.58);z-index:5;opacity:.55}
.slm2{transform:translate(calc(-50% - 146px),-50%) scale(.4);z-index:4;opacity:.3}
.slp2{transform:translate(calc(-50% + 146px),-50%) scale(.4);z-index:4;opacity:.3}
.slm3{transform:translate(calc(-50% - 174px),-50%) scale(.3);z-index:3;opacity:.1}
.slp3{transform:translate(calc(-50% + 174px),-50%) scale(.3);z-index:3;opacity:.1}
.slm4{transform:translate(calc(-50% - 192px),-50%) scale(.22);z-index:2;opacity:0}
.slp4{transform:translate(calc(-50% + 192px),-50%) scale(.22);z-index:2;opacity:0}
.acr{font-size:32px;font-weight:800;letter-spacing:2px;text-align:center;margin:12px 0 0;color:var(--navy)}
.offn{text-align:center;font-size:14px;min-height:18px}
.cnav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:14px}
.navb{width:48px;height:48px;border-radius:50%;border:1px solid #B7CCDD;background:#fff;font-size:19px;color:var(--acc);cursor:pointer;font-weight:700;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.navb.o{width:40px;height:40px;font-size:14px;background:#F1F6FA}
.lh{display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--navy);padding-bottom:10px;margin-bottom:10px}
.dft{border-top:1px solid #ccc;margin-top:22px;padding-top:8px;font-size:10.5px;color:#777;line-height:1.5;text-align:center}
@media print{body *{visibility:hidden}#pa,#pa *{visibility:visible}#pa{position:absolute;left:0;top:0;width:100%}}

/* top progress bar (real %) */
#pbw{position:fixed;top:0;left:0;right:0;height:4px;z-index:99999;display:none;background:rgba(27,111,168,.12);pointer-events:none}
#pb{height:100%;width:0%;background:linear-gradient(90deg,var(--acc,#1B6FA8),var(--g,#2E8B57));transition:width .15s ease}
#pbt{position:fixed;top:7px;right:8px;z-index:99999;display:none;font-size:10px;font-weight:700;color:var(--acc,#1B6FA8);background:rgba(255,255,255,.9);border:1px solid var(--line,#CBDBE8);padding:1px 7px;border-radius:10px;pointer-events:none}
.fmiss{border:2px solid #C94A3D !important;box-shadow:0 0 0 3px rgba(201,74,61,.25) !important}
.modal.mwide{max-width:790px}
.mwrap{display:flex;gap:14px;align-items:stretch}
.mmain{flex:1;min-width:0}
.mside{width:212px;min-width:170px;border-right:1px solid var(--line);padding:12px 12px 0 0;display:flex;flex-direction:column}
.mside input{width:100%;min-height:38px;padding:8px 10px;font-size:12.5px;margin-bottom:8px}
.mlist{overflow-y:auto;flex:1;max-height:66vh;padding-right:4px}
.mgl{font-size:10.5px;font-weight:700;color:var(--mut);letter-spacing:.4px;text-transform:uppercase;margin:8px 0 3px;position:sticky;top:0;background:#fff;padding:2px 0}
.mli{padding:6px 8px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;border-left:3px solid transparent}
.mli:hover{background:#F1F6FA}
.mli.on{background:#E3EDF5;color:var(--navy);border-left:3px solid var(--acc)}
@media(max-width:680px){.mside{display:none}.modal.mwide{max-width:500px}}
.tabbar{display:flex;gap:6px;margin-top:10px}
.tabbar .tb{flex:1;padding:8px 4px;text-align:center;border-radius:10px;border:1px solid var(--line);background:#F1F6FA;cursor:pointer;font-weight:700;font-size:12.5px;color:var(--mut);line-height:1.3}
.tabbar .tb.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.tabbar .tb .en{font-weight:400;font-size:10px;display:block;opacity:.8}
.ivrow{display:flex;gap:8px;align-items:center;padding:4px 6px;font-size:12.5px;cursor:pointer;border-radius:6px}
.ivrow:hover{background:#F1F6FA}
</style>
</head>
<body>
<div id="pbw"><div id="pb"></div></div><div id="pbt"></div>
<header id="hdr" class="hide"><img src="assets/logo.png" alt="Changwon 2026"><h1>Changwon 2026 WCH NPC Portal <span style="opacity:.75;font-weight:600">by LOC</span></h1><span class="sp"></span><span id="who" class="muted" style="font-size:12px"></span> <button class="btn sec" style="padding:6px 10px" onclick="logout()">Logout</button></header>
<div id="app"></div>
<div id="pa" class="hide"></div>

<script>
/* ==================== CONFIG (fill these) ==================== */
const SUPABASE_URL = "https://tkdvyxouknhjhaqjrotb.supabase.co";       // <-- Supabase Project URL
const SUPABASE_ANON_KEY = "sb_publishable_vka5Jqtl7JtyzV5BOv9ZcQ_2E5e76Iy";              // <-- Supabase anon public key
/* =========================================================== */

let sb=null;
try{ sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }catch(e){}
const MOCK = false;   // production build — Supabase only

// 77 NPCs [code, name, iso2]
const NPCS=[['ARG','Argentina','ar'],['AUS','Australia','au'],['AUT','Austria','at'],['AZE','Azerbaijan','az'],['BHU','Bhutan','bt'],['BIH','Bosnia and Herzegovina','ba'],['BRA','Brazil','br'],['BUL','Bulgaria','bg'],['CAN','Canada','ca'],['CHI','Chile','cl'],['CHN','China','cn'],['COL','Colombia','co'],['CRC','Costa Rica','cr'],['CRO','Croatia','hr'],['CUB','Cuba','cu'],['CYP','Cyprus','cy'],['CZE','Czechia','cz'],['DEN','Denmark','dk'],['EGY','Egypt','eg'],['ESP','Spain','es'],['FIN','Finland','fi'],['FRA','France','fr'],['GBR','Great Britain','gb'],['GEO','Georgia','ge'],['GER','Germany','de'],['GRE','Greece','gr'],['HKG','Hong Kong','hk'],['HUN','Hungary','hu'],['INA','Indonesia','id'],['IND','India','in'],['IRI','Iran','ir'],['IRQ','Iraq','iq'],['ISL','Iceland','is'],['ISR','Israel','il'],['ITA','Italy','it'],['JPN','Japan','jp'],['KAZ','Kazakhstan','kz'],['KEN','Kenya','ke'],['KOR','Korea','kr'],['KUW','Kuwait','kw'],['LAT','Latvia','lv'],['LTU','Lithuania','lt'],['LUX','Luxembourg','lu'],['MAS','Malaysia','my'],['MEX','Mexico','mx'],['MGL','Mongolia','mn'],['MKD','North Macedonia','mk'],['MLT','Malta','mt'],['MNE','Montenegro','me'],['NED','Netherlands','nl'],['NGA','Nigeria','ng'],['NOR','Norway','no'],['NZL','New Zealand','nz'],['PAN','Panama','pa'],['PER','Peru','pe'],['POL','Poland','pl'],['POR','Portugal','pt'],['PUR','Puerto Rico','pr'],['ROU','Romania','ro'],['RSA','South Africa','za'],['RUS','Russia','ru'],['SGP','Singapore','sg'],['SLO','Slovenia','si'],['SRB','Serbia','rs'],['SRI','Sri Lanka','lk'],['SUI','Switzerland','ch'],['SVK','Slovakia','sk'],['SWE','Sweden','se'],['THA','Thailand','th'],['TPE','Chinese Taipei','tw'],['TUR','Turkey','tr'],['UAE','United Arab Emirates','ae'],['UKR','Ukraine','ua'],['URU','Uruguay','uy'],['USA','United States','us'],['UZB','Uzbekistan','uz'],['VEN','Venezuela','ve']];
NPCS.sort(function(a,b){return a[0]<b[0]?-1:1});
function cname(c){var x=NPCS.find(function(n){return n[0]===c});return x?x[1]:c}
function iso2(c){var x=NPCS.find(function(n){return n[0]===c});return x?x[2]:''}
function flagUrl(c){return c==='TPE'?'assets/tpe.svg':'assets/flags/'+iso2(c)+'.png'}
function flagCdn(c){return 'https://flagcdn.com/'+iso2(c)+'.svg'}
function flagEmoji(c){var i=iso2(c);if(!i)return '\uD83C\uDFF3';return String.fromCodePoint(0x1F1E6+i.charCodeAt(0)-97,0x1F1E6+i.charCodeAt(1)-97);}
function flag(c,h){var i=iso2(c);return i?'<img src="'+flagUrl(c)+'" onerror="this.onerror=function(){this.replaceWith(\''+flagEmoji(c)+'\')};this.src=\''+flagCdn(c)+'\'" style="height:'+(h||18)+'px;border:0.5px solid #0003;border-radius:2px;vertical-align:middle">':''}

var S={country:'',logged:false,ci:0,cf:NPCS.slice()};
function $(s){return document.querySelector(s)}
function esc(v){return (v==null?'':String(v)).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])})}
function stage(h){$('#app').innerHTML='<div class="wrap">'+h+'</div>'}
async function sha(t){var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t+':cw26'));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('')}

/* ==== top progress bar: real percentage of processed steps ==== */
var _pbT=1,_pbN=0,_pbHide=null;
function pbSet(p){p=Math.max(0,Math.min(100,Math.round(p)));var b=document.getElementById('pb'),t=document.getElementById('pbt');if(b)b.style.width=p+'%';if(t)t.textContent=p+'%';}
function pbStart(total){_pbT=Math.max(1,total||1);_pbN=0;clearTimeout(_pbHide);var w=document.getElementById('pbw'),t=document.getElementById('pbt');if(w)w.style.display='block';if(t)t.style.display='block';pbSet(0);}
function pbStep(n){_pbN+=(n||1);pbSet(_pbN/_pbT*100);if(_pbN>=_pbT)pbEnd();}
function pbEnd(){pbSet(100);clearTimeout(_pbHide);_pbHide=setTimeout(function(){var w=document.getElementById('pbw'),t=document.getElementById('pbt');if(w)w.style.display='none';if(t)t.style.display='none';},400);}
function cfgOk(){return sb && SUPABASE_URL.indexOf('YOUR-PROJECT')<0 && SUPABASE_ANON_KEY.indexOf('YOUR-ANON')<0}

/* ============ DB layer (Supabase) ============ */
var sbDb={
  dirGet:async function(c){var r=await sb.from('npc_directory').select('*').eq('country',c).maybeSingle();return r.data;},
  dirByEmail:async function(e){var r=await sb.from('npc_directory').select('*').eq('email',e).maybeSingle();return r.data;},
  reqLatest:async function(c){var r=await sb.from('activation_requests').select('*').eq('country',c).order('id',{ascending:false}).limit(1).maybeSingle();return r.data;},
  reqAdd:async function(c,e){return sb.from('activation_requests').insert({country:c,email:e,status:'pending'});},
  members:async function(c){var r=await sb.from('members').select('*').eq('country',c).order('id');return r.data||[];},
  addMember:async function(m){return sb.from('members').insert(m);},
  updMember:async function(id,m){return sb.from('members').update(m).eq('id',id);},
  delMember:async function(id){return sb.from('members').delete().eq('id',id);},
  invites:async function(c){var r=await sb.from('invitations').select('*').eq('country',c).order('id');return r.data||[];},
  addInvite:async function(o){return sb.from('invitations').insert(o);},
  delInvite:async function(id){return sb.from('invitations').delete().eq('id',id);},
  firearms:async function(c){var r=await sb.from('firearms').select('*').eq('country',c).order('id');return r.data||[];},
  addFirearm:async function(o){return sb.from('firearms').insert(o);},
  delFirearm:async function(id){return sb.from('firearms').delete().eq('id',id);},
  fsubs:async function(c){var r=await sb.from('firearm_submissions').select('*').eq('country',c);return r.data||[];},
  setFsub:async function(c,g,d){return sb.from('firearm_submissions').upsert({country:c,grp:g,submitted_at:d},{onConflict:'country,grp'});},
  invoices:async function(c){var r=await sb.from('invoices').select('*').eq('country',c).order('id');return r.data||[];},
  addInvoice:async function(o){return sb.from('invoices').insert(o);},
  delInvoice:async function(id){return sb.from('invoices').delete().eq('id',id);},
  invAddrs:async function(c){var r=await sb.from('invoice_addresses').select('*').eq('country',c);return r.data||[];},
  setInvAddr:async function(c,g,a){return sb.from('invoice_addresses').upsert({country:c,grp:g,addr:a},{onConflict:'country,grp'});},
  gFlights:async function(c){var r=await sb.from('group_flights').select('*').eq('country',c);return r.data||[];},
  setGFlight:async function(c,g,o){var p=Object.assign({country:c,grp:g},o);return sb.from('group_flights').upsert(p,{onConflict:'country,grp'});}
};
var db = sbDb;

/* ============ Auth screens ============ */
function scrCountry(){
  $('#hdr').classList.add('hide');
  if(!cfgOk()){stage('<div class="card"><h3>Setup required</h3><p class="muted" style="font-size:13px">This tool needs a Supabase Project URL and anon key. Open <b>submit.html</b> and fill in <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> at the top of the script, and run <b>supabase_schema.sql</b> in your Supabase SQL editor.</p></div>');return;}
  var mb = '';
  $('#app').innerHTML='<div class="center"><div class="box">'+mb+'<div class="logo"><img src="assets/logo.png"><img src="assets/ksfd.png" onerror="this.remove()"></div>'+
    '<h2 style="margin:4px 0 2px;text-align:center;font-size:17px">Changwon 2026 WCH NPC Portal <span style="color:var(--acc)">by LOC</span></h2>'+
    '<p class="muted" style="text-align:center;margin:0 0 6px;font-size:12px">Changwon 2026 WSPS World Championships</p>'+
    '<div id="cslot" class="slotwrap"></div><div class="acr" id="cacr"></div><div class="offn muted" id="coffn"></div>'+
    '<div class="cnav"><button class="navb o" onpointerdown="holdShift(-1)" onpointerup="holdStop()" onpointerleave="holdStop()" onpointercancel="holdStop()" oncontextmenu="return false">&laquo;</button><button class="navb" onclick="cShift(-1)">&lsaquo;</button><span class="muted" style="font-size:12px">swipe · hold &laquo; &raquo;</span><button class="navb" onclick="cShift(1)">&rsaquo;</button><button class="navb o" onpointerdown="holdShift(1)" onpointerup="holdStop()" onpointerleave="holdStop()" onpointercancel="holdStop()" oncontextmenu="return false">&raquo;</button></div>'+
    '<div class="f"><input id="csearch" placeholder="Search country or code…" oninput="cFilter(this.value)"></div>'+
    '<button class="btn" style="width:100%" id="ccont" onclick="pickCountry()">Continue</button>'+
    '<div class="err" id="er"></div></div></div>';
  var lc=localStorage.getItem('cw_last_country');
  if(lc){var li=S.cf.findIndex(function(n){return n[0]===lc});if(li>=0)S.ci=li;}
  ccPaint(); bindSwipe();
}
function ccPaint(){
  var w=$('#cslot');if(!w)return;var n=S.cf.length;
  if(!n){w.innerHTML='<div class="muted" style="text-align:center;padding-top:44px">No match</div>';$('#cacr').textContent='—';$('#coffn').textContent='';$('#ccont').textContent='Continue';return;}
  var CLS={'-4':'slm4','-3':'slm3','-2':'slm2','-1':'slm1','0':'sl0','1':'slp1','2':'slp2','3':'slp3','4':'slp4'};
  var want={};
  for(var o=-4;o<=4;o++){
    if(n<9&&Math.abs(o)>Math.floor((n-1)/2))continue;
    var c=S.cf[((S.ci+o)%n+n)%n];
    if(!want[c[0]])want[c[0]]={cls:'slot '+CLS[o],o:o};
  }
  var have={};
  Array.prototype.slice.call(w.children).forEach(function(el){var k=el.getAttribute('data-c');if(!k||!want[k]){el.remove();return;}have[k]=el;});
  Object.keys(want).forEach(function(k){
    var t=want[k],el=have[k];

   '<div class="tbl" style="margin-top:6px;border-color:var(--y)"><table><thead><tr><th>Arr. date</th><th>Flight</th><th>Landing</th><th>Dep. date</th><th>Flight</th><th>Take-off</th><th></th></tr></thead><tbody><tr>'+gfInputs('_all',null)+'<td><button class="btn y" style="padding:4px 10px;font-size:11px;white-space:nowrap" onclick="gfSaveAll()">전 그룹 항공일정 일괄 저장</button></td></tr></tbody></table></div></div>';}
function gfCollect(sfx){var ids=['gfa','gfaf','gfat','gfd','gfdf','gfdt'];var ks=['arrive','arr_flight','arr_time','depart','dep_flight','dep_time'];var o={};var bad=0;
  for(var j=0;j<6;j++){var el=document.getElementById(ids[j]+sfx);var v=el?(el.value||'').trim():'';var ok=v!==''&&((ids[j]!=='gfat'&&ids[j]!=='gfdt')||timeOk(v));if(el)el.classList.toggle('fmiss',!ok);if(!ok)bad++;o[ks[j]]=v;}
  return bad?null:o;}
async function gfPropagate(g,o){var t=_mem.filter(function(m){return m.follow_flight==='Yes'&&grpOf(m)===g});
  for(var j=0;j<t.length;j++){await db.updMember(t[j].id,{arrive:o.arrive,arr_flight:o.arr_flight,arr_time:o.arr_time,depart:o.depart,dep_flight:o.dep_flight,dep_time:o.dep_time});pbStep();}return t.length;}
async function gfSave(i){var g=_gfGroups[i];if(!g)return;var o=gfCollect(i);if(!o){alert('모든 칸을 채우고 시간은 24시간제(HH:MM)로 입력하세요.');return;}
  var fw=_mem.filter(function(m){return m.follow_flight==='Yes'&&grpOf(m)===g}).length;
  pbStart(fw+2);var r=await db.setGFlight(S.country,g,o);pbStep();if(r&&r.error){alert(r.error.message);return;}
  await gfPropagate(g,o);_gf=await db.gFlights(S.country);_mem=await db.members(S.country);pbStep();renderTeam();}
async function gfSaveAll(){var o=gfCollect('_all');if(!o){alert('모든 칸을 채우고 시간은 24시간제(HH:MM)로 입력하세요.');return;}
  if(!confirm('모든 그룹('+_gfGroups.length+'개)의 항공일정을 이 일정으로 통일하고, 그룹 일정을 따르는 인원 전원에게 반영합니다. 계속할까요?'))return;
  var fw=_mem.filter(function(m){return m.follow_flight==='Yes'}).length;
  pbStart(_gfGroups.length+fw+1);

function openMemModal(){var m=_mem[_emIdx];if(!m)return;var old=document.getElementById('mm');if(old)old.remove();document.body.insertAdjacentHTML('beforeend',memModalHtml(m,_emIdx));
  REQ_EF.forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('input',function(){el.classList.remove('fmiss')});});}
function collectMem(){return {first_name:$('#ef_first').value,last_name:$('#ef_last').value,position:$('#ef_pos').value,dob:$('#ef_dob').value,passport:$('#ef_pass').value,sub_group:$('#ef_grp').value,arrive:$('#ef_arr').value,arr_flight:$('#ef_arrf').value,arr_time:$('#ef_arrt').value,depart:$('#ef_dep').value,dep_flight:$('#ef_depf').value,dep_time:$('#ef_dept').value,room:$('#ef_room').value,wheelchair:$('#ef_wc').value,follow_flight:(document.getElementById('ef_follow')&&document.getElementById('ef_follow').checked)?'Yes':'No'};}
function timeOk(v){return /^([01]\d|2[0-3]):[0-5]\d$/.test(v)}
function tFmt(el){var raw=el.value;var d=raw.replace(/[^0-9]/g,'').slice(0,4);
  if(/^\d{1,2}:\d{0,2}$/.test(raw)){el.classList.remove('fmiss');return;}
  el.value=(d.length===4)?d.slice(0,2)+':'+d.slice(2):d;el.classList.remove('fmiss');}
function tBlur(el){var v=el.value.trim();var m=v.match(/^(\d{1,2}):(\d{1,2})$/);
  if(m){el.value=('0'+m[1]).slice(-2)+':'+('0'+m[2]).slice(-2);}
  else if(/^\d{3}$/.test(v)){el.value='0'+v.charAt(0)+':'+v.slice(1);}
  if(el.value&&!timeOk(el.value))el.classList.add('fmiss');}

  if(_invTab==='group'){
    body=groupsOf().length?
     '<div class="row" style="gap:8px;align-items:flex-end;margin-top:10px"><div class="f" style="margin:0;flex:1"><label>Group (recipient)</label><select id="vg" onchange="invScopeChg()">'+grpOnlyOptions()+'</select></div><button class="btn g" onclick="reqInvoice()">Request draft</button></div>'+invAddrField()+
     '<p class="muted" style="font-size:11.5px;margin:2px 0 0">선택한 세부소속 인원만 포함됩니다. 수취인별 주소는 저장되어 재사용됩니다.</p>'
     :'<p class="muted" style="font-size:12.5px;margin-top:10px">등록된 인원/그룹이 없습니다. 먼저 선수단 정보에서 명단을 입력하세요.</p>';
  }else if(_invTab==='all'){
    body='<p style="font-size:13px;margin:12px 0 4px"><b>전체 선수단 ('+_mem.length+'명)</b>이 하나의 인보이스로 신청됩니다.</p>'+invAddrField()+
     '<button class="btn g" style="width:100%" onclick="reqInvoice()">Request draft — entire delegation</button>';
  }else{
    body='<p class="muted" style="font-size:12px;margin:10px 0 4px">포함할 인원을 직접 선택하세요. 그룹 헤더 체크박스로 그룹 전체를 선택/해제할 수 있습니다.</p>'+
     '<div style="max-height:260px;overflow-y:auto;border:1px solid var(--line);border-radius:10px;padding:4px 8px">'+(_mem.length?invCustomListHtml():'<span class="muted" style="font-size:12px">No members.</span>')+'</div>'+
     '<div class="f" style="margin-top:10px"><label>To (recipient name · required)</label><input id="vt" placeholder="e.g. East Region Shooting Association" oninput="this.classList.remove(\'fmiss\');invcPreviewDraft()"></div>'+invAddrField()+
     '<button class="btn g" style="width:100%" onclick="reqInvoiceCustom()">Request draft — <span id="ivcnt">0</span> selected</button>';
  }
  stage('<div class="card"><div class="row"><button class="btn sec" onclick="scrMain()">&larr; Back</button><b style="margin-left:6px">Invoice</b><button class="btn sec" style="margin-left:auto;padding:6px 10px" onclick="modTeam()">Manage roster &rarr;</button></div><p class="muted" style="font-size:12px">인보이스는 선수단 정보(객실 종류 · 투숙 기간)와 연동됩니다. 금액은 조직위 승인 시 확정·기재됩니다.</p></div>'+
  '<div class="card"><b>Request invoice</b>'+tabbar+body+'</div>'+
  '<div class="card"><b>Requested invoices</b><div class="tbl" style="margin-top:8px"><table><thead><tr><th>No.</th><th>Scope</th><th>Members</th><th>Status</th><th></th></tr></thead><tbody>'+
   (_invc.length?_invc.map(function(V){var n=(V.member_ids||[]).length;return '<tr><td>'+(V.no?'<b>'+esc(V.no)+'</b>':'<span class="muted">— pending</span>')+'</td><td>'+esc(V.title)+'</td><td>'+n+'</td><td>'+(V.status==='approved'?'<span class="tag g">approved</span>':'<span class="tag y">pending approval</span>')+'</td><td><button class="btn sec" style="padding:3px 8px" onclick="prevInvoice('+V.id+')">Preview</button>'+(V.status==='approved'?'':' <button class="btn r" style="padding:3px 8px" onclick="withdrawInvoice('+V.id+')">Withdraw</button>')+'</td></tr>'}).join(''):'<tr><td colspan="5" class="muted">No invoices requested yet.</td></tr>')+
  '</tbody></table></div></div>'+
  '<div class="card" id="vpv"></div>');
  if(_invTab==='custom'){invcPreviewDraft();}else{invScopeChg();}
}
function addrOf(g){var x=_iaddr.find(function(a){return (a.grp||'*ALL*')===g});return x?(x.addr||''):'';}
function invScopeChg(){var g=invScope();if($('#va')&&g)$('#va').value=addrOf(g);invcPreviewDraft();}
async function saveInvAddr(){if(_invTab==='custom'){invcPreviewDraft();return;}var g=invScope(),a=$('#va').value.trim();if(!g)return;await db.setInvAddr(S.country,g,a);_iaddr=await db.invAddrs(S.country);invcPreviewDraft();}
async function reqInvoice(){var g=invScope();if(!g)return;var mem=scopeMembers(g);if(!mem.length){alert('No members in that scope.');return;}var a=addrOf(g);if(!a){alert('Register the recipient address first.');return;}var t=(g==='*ALL*'?'Entire delegation':g);var r=await db.addInvoice({country:S.country,title:t,member_ids:mem.map(function(m){return m.id}),status:'pending',no:'',addr:a});if(r.error){alert(r.error.message);return;}_invc=await db.invoices(S.country);renderInvoice();}
async function withdrawInvoice(id){var V=_invc.find(function(x){return x.id===id});if(!V||V.status==='approved')return;if(!confirm('Withdraw this invoice request?'))return;await db.delInvoice(id);_invc=await db.invoices(S.country);renderInvoice();}
function invoiceDoc(V){var isA=V.status==='approved';var wm=isA?'':'<div class="wm"><span>PENDING<br>APPROVAL</span></div>';var mem=_mem.filter(function(m){return (V.member_ids||[]).indexOf(m.id)>=0});
  return '<div class="doc" id="vi">'+wm+'<div class="lh"><img src="assets/logo.png" style="height:46px"><div style="flex:1;text-align:center;font-weight:bold;font-size:13px;line-height:1.35;color:#16456B">Korea Shooting Federation for Disabled<br>Changwon 2026 WSPS World Championships Organising Committee</div><img src="assets/ksfd.png" onerror="this.remove()" style="height:46px"></div>'+
  '<p style="display:flex;justify-content:space-between;font-size:12px"><span>No. '+(isA?'Changwon 2026 WSPS WCH OC-I-'+esc(V.no):'— issued upon approval')+'</span><span>Date: '+(isA?esc(V.approved_at||''):'—')+'</span></p>'+
  '<h2 style="font-size:20px">INVOICE</h2><p style="text-align:center;font-weight:bold">Changwon 2026 WSPS World Championships</p>'+
  '<p style="margin:2px 0"><b>To:</b> '+(V.title&&V.title!=='Entire delegation'?'<b>'+esc(V.title)+'</b> — ':'')+esc(cname(V.country))+' delegation</p><p style="margin:2px 0"><b>NPC Code:</b> '+esc(V.country)+'</p><p style="margin:2px 0 10px"><b>Address:</b> '+esc(V.addr||addrOf(V.title&&V.title!=='Entire delegation'?V.title:'*ALL*')||'—')+'</p>'+
  '<table style="width:100%;margin:14px 0"><thead><tr><th>Full Name</th><th>Room</th><th>Arrival</th><th>Departure</th><th>Nights</th><th>Wheelchair</th></tr></thead><tbody>'+
  mem.map(function(m){return '<tr><td>'+esc(mName(m))+'</td><td>'+esc(m.room||'')+'</td><td>'+esc(m.arrive||'')+'</td><td>'+esc(m.depart||'')+'</td><td>'+nights(m.arrive,m.depart)+'</td><td>'+esc(m.wheelchair||'')+'</td></tr>'}).join('')+'</tbody></table>'+
  (isA?'<div style="border:1px solid #999;padding:9px 12px;margin:10px 0;font-size:12.5px;line-height:1.6"><b>Banking Information</b><br>Bank: Shinhan Bank<br>SWIFT Code: SHBKKRSE<br>Account Holder: Korea Shooting Federation for the Disabled<br>Account No.: '+esc(V.account||'—')+'<br>Address: 134, Sangmujayu-ro, Seo-gu, Gwangju-city 61963, Korea</div><p style="font-size:11.5px"><b>NOTE:</b> Please make all payments in USD. Any bank fees or charges must be paid by the payee on top at the time of payment. Any outstanding fees must be paid prior to collection of start numbers.</p><p style="text-align:center;font-size:11px;color:#666">Issued electronically, valid without stamp and signature</p>':'<p>This is a <b>draft invoice request</b>. Amounts and the <b>Banking Information</b> for payment to the Organizing Committee are entered by the OC upon approval — the final invoice is then issued to your delegation.</p>')+'<p style="margin-top:30px">With best regards,</p><p style="margin-top:20px"><b>President</b><br>Korea Shooting Federation for the Disabled</p><div class="dft">ZIP 61998 · 8F, Mareukbokgar-ro 154, Seo-gu, Gwangju, Republic of Korea<br>PHONE +82 62 710 5391 / FAX +82 62 710 9851 / ksfd0427@hanmail.net / www.ksfd.kosad.kr</div></div>';}
function prevInvoice(id){var V=_invc.find(function(x){return x.id===id});if(!V)return;var box=$('#vpv');var isA=V.status==='approved';box.innerHTML='<div class="row" style="margin-bottom:8px"><b>'+(V.no?esc(V.no)+' · ':'')+esc(V.title)+'</b>'+(isA?'<button class="btn" style="margin-left:auto" onclick="printEl(\'vi\')">Print / PDF</button>':'<span class="tag y" style="margin-left:auto">Preview only — issued on approval</span>')+'</div>'+invoiceDoc(V);}
function invcPreviewDraft(){var box=$('#vpv');if(!box)return;var mem,t,a;
  if(_invTab==='custom'){mem=ivSelected();t=($('#vt')&&$('#vt').value.trim())||'Custom selection';a=($('#va')&&$('#va').value.trim())||'';var cnt=document.getElementById('ivcnt');if(cnt)cnt.textContent=mem.length;}
  else{var g=invScope()||'*ALL*';mem=scopeMembers(g);t=(g==='*ALL*'?'Entire delegation':(g==='(Ungrouped)'?'Ungrouped':g));a=addrOf(g);}
  var V={country:S.country,title:t,member_ids:mem.map(function(m){return m.id}),status:'pending',no:'',addr:a};
  box.innerHTML='<div class="row" style="margin-bottom:8px"><b>Live preview — '+esc(t)+' ('+mem.length+'명)</b><span class="tag y" style="margin-left:auto">PENDING APPROVAL — amounts issued on approval</span></div>'+invoiceDoc(V);}

/* ============ print ============ */
function printEl(id){var n=document.getElementById(id);if(!n){alert('No document');return;}$('#pa').innerHTML='<div class="doc">'+n.innerHTML+'</div>';$('#pa').classList.remove('hide');window.print();setTimeout(function(){$('#pa').classList.add('hide')},400);}

/* warm up connection so the first lookup is fast */
if(!MOCK&&sb&&cfgOk()){try{var _pc=document.createElement('link');_pc.rel='preconnect';_pc.href=SUPABASE_URL;document.head.appendChild(_pc);sb.from('npc_directory').select('country').limit(1).then(function(){});}catch(e){}}
/* entry: handle emailed setup/recovery links (invite & password reset) */
if(!MOCK&&sb&&cfgOk()){
  try{sb.auth.onAuthStateChange(function(ev){if(ev==='PASSWORD_RECOVERY')scrSetPw();});}catch(e){}
  if(/type=(invite|recovery|signup)/.test(location.hash)){scrSetPw();}else{scrCountry();}
}else{
  scrCountry();
}
</script>
