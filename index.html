/* ============ DB layer (Supabase) ============ */
var sbDb={
  dirGet:async function(c){var r=await sb.from('npc_directory').select('*').eq('country',c).maybeSingle();return r.data;},
  dirByEmail:async function(e){var r=await sb.from('npc_directory').select('*').eq('email',e).maybeSingle();return r.data;},
  reqLatest:async function(c){var r=await sb.from('activation_requests').select('*').eq('country',c).order('id',{ascending:false}).limit(1).maybeSingle();return r.data;},
  reqAdd:async function(c,e){return sb.from('activation_requests').insert({country:c,email:e,status:'pending'});},
  members:async function(c){var r=await sb.from('members').select('*').eq('country',c).order('id');return r.data||[];},
  addMember:async function(m){return sb.from('members').insert(m);},
  updMember:async function(id,m){return sb.from('members').update(m).eq('id',id);},
  delMember:async function(id){return sb.from('members').delete().eq('id',id);},
  invites:async function(c){var r=await sb.from('invitations').select('*').eq('country',c).order('id');return r.data||[];},
  addInvite:async function(o){return sb.from('invitations').insert(o);},
  delInvite:async function(id){return sb.from('invitations').delete().eq('id',id);},
  firearms:async function(c){var r=await sb.from('firearms').select('*').eq('country',c).order('id');return r.data||[];},
  addFirearm:async function(o){return sb.from('firearms').insert(o);},
  delFirearm:async function(id){return sb.from('firearms').delete().eq('id',id);},
  fsubs:async function(c){var r=await sb.from('firearm_submissions').select('*').eq('country',c);return r.data||[];},
  setFsub:async function(c,g,d){return sb.from('firearm_submissions').upsert({country:c,grp:g,submitted_at:d},{onConflict:'country,grp'});},
  invoices:async function(c){var r=await sb.from('invoices').select('*').eq('country',c).order('id');return r.data||[];},
  addInvoice:async function(o){return sb.from('invoices').insert(o);},
  delInvoice:async function(id){return sb.from('invoices').delete().eq('id',id);},
  invAddrs:async function(c){var r=await sb.from('invoice_addresses').select('*').eq('country',c);return r.data||[];},
  setInvAddr:async function(c,g,a){return sb.from('invoice_addresses').upsert({country:c,grp:g,addr:a},{onConflict:'country,grp'});},
  gFlights:async function(c){var r=await sb.from('group_flights').select('*').eq('country',c);return r.data||[];},
  setGFlight:async function(c,g,o){var p=Object.assign({country:c,grp:g},o);return sb.from('group_flights').upsert(p,{onConflict:'country,grp'});},
  getSetting:async function(k){var r=await sb.from('oc_settings').select('value').eq('key',k).maybeSingle();return r.data?r.data.value:null;}
};

function ccPaint(){
  var w=$('#cslot');if(!w)return;var n=S.cf.length;
  if(!n){w.innerHTML='<div class="muted" style="text-align:center;padding-top:44px">No match</div>';$('#cacr').textContent='—';$('#coffn').textContent='';$('#ccont').textContent='Continue';return;}
  var CLS={'-4':'slm4','-3':'slm3','-2':'slm2','-1':'slm1','0':'sl0','1':'slp1','2':'slp2','3':'slp3','4':'slp4'};
  var want={};
  for(var o=-4;o<=4;o++){
    if(n<9&&Math.abs(o)>Math.floor((n-1)/2))continue;
    var c=S.cf[((S.ci+o)%n+n)%n];
    if(!want[c[0]])want[c[0]]={cls:'slot '+CLS[o],o:o};
  }
  var have={};
  Array.prototype.slice.call(w.children).forEach(function(el){var k=el.getAttribute('data-c');if(!k||!want[k]){el.remove();return;}have[k]=el;});
  Object.keys(want).forEach(function(k){
    var t=want[k],el=have[k];
    if(!el){el=document.createElement('div');el.setAttribute('data-c',k);el.className=t.cls;el.innerHTML='<div class="fimg"><img src="'+flagUrl(k)+'" onerror="this.onerror=function(){this.replaceWith(document.createTextNode(\''+flagEmoji(k)+'\'))};this.src=\''+flagCdn(k)+'\'"></div>';w.appendChild(el);}
    el.className=t.cls;
    el.style.cursor=t.o?'pointer':'default';
    el.onclick=t.o?(function(o){return function(){cShift(o)}})(t.o):null;
  });
  var cur=S.cf[S.ci];
  $('#cacr').textContent=cur[0];$('#coffn').textContent=cur[1];
  $('#ccont').textContent='Continue as '+cur[0]+' — '+cur[1];
}
var _hold=null;
function holdShift(d){holdStop();var delay=340;(function step(){cShift(d);delay=Math.max(75,delay*0.82);_hold=setTimeout(step,delay);})();}
function holdStop(){if(_hold){clearTimeout(_hold);_hold=null;}}
function cShift(d){if(!S.cf.length)return;S.ci=((S.ci+d)%S.cf.length+S.cf.length)%S.cf.length;ccPaint();}
function cFilter(q){q=q.trim().toLowerCase();S.cf=q?NPCS.filter(function(n){return n[0].toLowerCase().indexOf(q)>=0||n[1].toLowerCase().indexOf(q)>=0}):NPCS.slice();S.ci=0;ccPaint();}
function bindSwipe(){var w=$('#cslot');if(!w)return;var x0=null;
  w.addEventListener('touchstart',function(e){x0=e.touches[0].clientX},{passive:true});
  w.addEventListener('touchend',function(e){if(x0==null)return;var dx=e.changedTouches[0].clientX-x0;if(Math.abs(dx)>30)cShift(dx<0?1:-1);x0=null},{passive:true});
}
async function pickCountry(){if(!S.cf.length){$('#er').textContent='Select a country.';return;}var c=S.cf[S.ci][0];localStorage.setItem('cw_last_country',c);S.country=c;pbStart(2);var rs=await Promise.all([db.dirGet(c).then(function(x){pbStep();return x}),db.reqLatest(c).then(function(x){pbStep();return x})]);var dir=rs[0],rq=rs[1];if(dir&&dir.active){pbEnd();scrLogin();return;}if(rq&&rq.status==='pending'){scrPendingReq(rq);return;}if(rq&&rq.status==='approved'){scrAwaitSetup(rq);return;}scrActivate();}

  if(/^\d{1,2}:\d{0,2}$/.test(raw)){el.classList.remove('fmiss');return;}

var PHOTO_MAX_MB=15;var PHOTO_TYPES=['image/jpeg','image/png','image/webp','image/heic','image/heif'];
function bindPhoto(k){var f=$('#ph_'+k);f.onchange=function(){var file=f.files[0];if(!file)return;
  var ty=(file.type||'').toLowerCase();
  if(ty&&PHOTO_TYPES.indexOf(ty)<0){alert(T('Allowed formats: JPG · PNG · WebP · HEIC'));f.value='';return;}
  if(file.size>PHOTO_MAX_MB*1024*1024){alert('Photo too large — max '+PHOTO_MAX_MB+'MB per photo.');f.value='';return;}
  resizeImg(file,function(d){_photo[k]=d;$('#pv_'+k).innerHTML='<img src="'+d+'" style="max-height:90px;border-radius:6px">'})}}
function resizeImg(file,cb){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var m=MOCK?480:1024,w=img.width,h=img.height,s=Math.min(m/w,m/h,1);w=Math.round(w*s);h=Math.round(h*s);var cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);var d=cv.toDataURL('image/jpeg',0.78);if(d.length>1000000)d=cv.toDataURL('image/jpeg',0.6);if(d.length>1000000)d=cv.toDataURL('image/jpeg',0.45);cb(d)};img.onerror=function(){alert(T('Could not read the image — please try again with JPG or PNG.'))};img.src=e.target.result};r.readAsDataURL(file);}
/* Storage 업로드: base64 → Supabase Storage 파일(URL 저장). 실패 시 base64 폴백 */
async function upPhoto(dataUrl,kind){if(MOCK||!dataUrl||dataUrl.indexOf('data:')!==0)return dataUrl;
  try{var blob=await (await fetch(dataUrl)).blob();
    var path=S.country+'/'+Date.now()+'_'+Math.random().toString(36).slice(2,8)+'_'+kind+'.jpg';
    var r=await sb.storage.from('firearms').upload(path,blob,{contentType:'image/jpeg'});
    if(r.error)return dataUrl;
    var u=sb.storage.from('firearms').getPublicUrl(path);
    return (u&&u.data&&u.data.publicUrl)||dataUrl;
  }catch(e){return dataUrl;}}
async function delPhotoUrl(u){try{if(MOCK||!u||u.indexOf('/storage/')<0)return;var p=u.split('/firearms/')[1];if(p)await sb.storage.from('firearms').remove([decodeURIComponent(p)]);}catch(e){}}
async function fSave(){var t=$('#f_type').value;if(!t){alert(T('Select a firearm type.'));return;}var cal=calOf(t);if(t==='Shotgun'){var sel=$('#f_shsel');cal=(sel&&sel.value==='__c')?(($('#f_shc').value||'').trim()||'12ga'):'12ga';}
  var o={country:S.country,owner:$('#f_owner').value,manufacturer:$('#f_man').value,model:$('#f_mod').value,serial:$('#f_ser').value,type:t,caliber:cal,photo_full:_photo.full,photo_num:_photo.num};
  if(!o.owner||!o.manufacturer||!o.model||!o.serial){alert(T('Fill owner, manufacturer, model, serial.'));return;}
  if(!o.photo_full||!o.photo_num){if(!confirm(T('Both photos are required for customs clearance. Save as draft anyway?')))return;}
  pbStart(3);o.photo_full=await upPhoto(o.photo_full,'full');pbStep();o.photo_num=await upPhoto(o.photo_num,'num');pbStep();var r=await db.addFirearm(o);pbStep();if(r.error){alert(r.error.message);return;}modFirearm();}
async function fDel(id){if(!confirm(T('Delete this firearm?')))return;var fg0=_fg.find(function(x){return x.id===id});if(fg0){await delPhotoUrl(fg0.photo_full);await delPhotoUrl(fg0.photo_num);}await db.delFirearm(id);modFirearm();}

   '<p style="display:flex;justify-content:space-between;font-size:12px"><span>No. '+(sub?'Changwon 2026 WSPS WCH '+esc(ref):'—')+'</span><span>Date: '+(sub?esc(s.submitted_at||''):'—')+'</span></p>'+
   '<h2 style="font-size:19px">CONFIRMATION OF FIREARM SUBMISSION</h2><p style="text-align:center;font-weight:bold">Changwon 2026 WSPS World Championships</p>'+
   '<p>This is to confirm that the <b>'+esc(cname(S.country))+' ('+esc(S.country)+')</b> delegation'+label+' has submitted the following firearm import/export information'+(sub?' on <b>'+esc(s.submitted_at)+'</b>':'')+' for customs clearance:</p>'+
   '<table style="width:100%;margin:14px 0"><thead><tr><th>Owner</th><th>Manufacturer</th><th>Model</th><th>Serial No.</th><th>Type</th><th>Caliber</th><th>Photos</th></tr></thead><tbody>'+
   (list.length?list.map(function(g2){return '<tr><td>'+esc(g2.owner)+'</td><td>'+esc(g2.manufacturer)+'</td><td>'+esc(g2.model)+'</td><td>'+esc(g2.serial)+'</td><td>'+esc(g2.type)+'</td><td>'+esc(g2.caliber)+'</td><td>'+((g2.photo_full&&g2.photo_num)?'2/2':((g2.photo_full?1:0)+(g2.photo_num?1:0))+'/2')+'</td></tr>'}).join(''):'<tr><td colspan="7" style="color:#888">No firearms in this scope.</td></tr>')+'</tbody></table>'+
   '<p>This confirmation is issued for customs and administrative reference. The listed firearms are declared for temporary import/export for the duration of the Competition.</p>'+'<div class="dsign"><p style="margin-top:30px">With best regards,</p><p style="margin-top:20px"><b>President</b><br>Korea Shooting Federation for the Disabled</p></div></div><footer class="dfoot"><div class="dft">ZIP 61998 · 8F, Mareukbokgar-ro 154, Seo-gu, Gwangju, Republic of Korea<br>PHONE +82 62 710 5391 / FAX +82 62 710 9851 / ksfd0427@hanmail.net / www.ksfd.kosad.kr</div></footer></div>';}
function fCert(g){var box=$('#fpv');if(!box)return;var s=subFor(g);var sub=s&&s.submitted_at;var label=g==='*ALL*'?'Entire delegation':g;var st=sub?'<button class="btn" style="margin-left:auto" onclick="printEl(\'fd\')">Print / PDF</button>':'<span class="tag y" style="margin-left:auto">'+tl('Not submitted — preview')+'</span>';box.innerHTML='<div class="row" style="margin-bottom:8px"><b>'+L('Submission confirmation')+' — '+esc(label)+'</b>'+st+'</div>'+fCertDoc(s,g);}

function usdF(n){return Math.round(n).toLocaleString('en-US')+' USD';}
function dfmt(iso){var d=new Date(iso);if(isNaN(d.getTime()))return iso||'—';var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+'-'+M[d.getMonth()]+'-'+String(d.getFullYear()).slice(-2);}
var _trOpt='1',_trPer={},_trSlots=0;

function buildAutoItems(mem){var P=pricingOf();var items=[];
  function nOf(m){return Number(nights(m.arrive,m.depart))||0;}
  function byN(list){var o={};list.forEach(function(m){var n=nOf(m);if(n>0)(o[n]=o[n]||[]).push(m)});return o;}
  [['Twin',P.twin],['Single',P.single]].forEach(function(rt){var g=byN(mem.filter(function(m){return (m.room||'Twin')===rt[0]}));Object.keys(g).sort(function(a,b){return a-b}).forEach(function(n){var c=g[n].length;items.push({sec:'Accommodation',d:'Hotel Room ('+rt[0]+')',s:'(per person, incl. breakfast/lunch/dinner)',q:n+' Nights',m:'* '+c+' People',p:'* '+rt[1]+' USD =',t:n*c*rt[1]});});});
  [['1','Transportation — Option 1','(ICN/PUS → ground vehicle → Changwon)',P.tr1],['2','Transportation — Option 2','(ICN → domestic flight → PUS → Changwon)',P.tr2]].forEach(function(cfg){
    var c=mem.filter(function(m){return trOptOf(m)===cfg[0]}).length;
    if(c)items.push({sec:'Transportation',d:cfg[1],s:cfg[2],q:c+' People',m:'',p:'* '+cfg[3]+' USD =',t:c*cfg[3]});});
  var fa=mem.filter(function(m){return (_fg||[]).some(function(g2){return g2.owner===mName(m)||g2.owner===m.name})}).length;
  if(fa)items.push({sec:'Miscellaneous',d:'Firearms Import/Export Fee',s:'(per athlete)',q:fa+' Athlete(s)',m:'',p:'* '+P.firearm+' USD =',t:fa*P.firearm});
  var ts2=Number(_trSlots)||0;
  if(ts2>0)items.push({sec:'Miscellaneous',d:'Unofficial Training Fee',s:'(per training slot)',q:ts2+' Slot(s)',m:'',p:'* '+P.training+' USD =',t:ts2*P.training});
  return items;}
function itemsToTable(items){
  function rowH(r){return '<tr><td style="border:1px solid #bbb;padding:4px 8px">'+esc(r.d)+(r.s?'<span style="display:block;font-size:9.5px;color:#a33">'+esc(r.s)+'</span>':'')+'</td><td style="border:1px solid #bbb;padding:4px 8px;text-align:right">'+esc(r.q||'')+'</td><td style="border:1px solid #bbb;padding:4px 8px;text-align:right">'+esc(r.m||'')+'</td><td style="border:1px solid #bbb;padding:4px 8px;text-align:right">'+esc(r.p||'')+'</td><td style="border:1px solid #bbb;padding:4px 8px;text-align:right">'+usdF(+r.t||0)+'</td></tr>';}
  function secH(name,total){return '<tr><td colspan="4" style="border:1px solid #bbb;padding:5px 8px;font-weight:bold;font-size:14px">'+esc(name)+'</td><td style="border:1px solid #bbb;padding:5px 8px;text-align:right;font-weight:bold">'+usdF(total)+'</td></tr>';}
  var order=[],by={};(items||[]).forEach(function(it){var k=it.sec||'Other';if(!by[k]){by[k]=[];order.push(k);}by[k].push(it);});
  var h='<table style="width:100%;margin:10px 0;border-collapse:collapse;font-size:12px"><thead><tr><th style="border:1px solid #444;padding:5px 8px;width:33%">Description</th><th style="border:1px solid #444;padding:5px 8px">Quantity</th><th style="border:1px solid #444;padding:5px 8px"></th><th style="border:1px solid #444;padding:5px 8px">Price</th><th style="border:1px solid #444;padding:5px 8px;width:18%">Total</th></tr></thead><tbody>';
  var tot=0;order.forEach(function(k){var st=by[k].reduce(function(a,b){return a+(+b.t||0)},0);tot+=st;h+=secH(k,st)+by[k].map(rowH).join('');});
  h+='<tr><td colspan="3" style="border:none;padding:6px 8px"></td><td style="border:1px solid #444;padding:6px 8px;font-weight:bold;text-align:center;font-size:14px">TOTAL</td><td style="border:1px solid #444;padding:6px 8px;text-align:right;font-weight:bold;font-size:14px">'+usdF(tot)+'</td></tr></tbody></table>';
  if(!order.length)h+='<p style="font-size:11.5px;color:#a33">No billable items yet — members need arrival/departure dates in Delegation info.</p>';
  return h;}
function invItemsTable(mem){return itemsToTable(buildAutoItems(mem));}
function billingOpts(){var P=pricingOf();

  '<div class="f" style="margin:0;flex:1;min-width:250px"><label>'+L('Transportation option (default for everyone)')+'</label><select id="tropt" onchange="trOptChg(this.value)"><option value="1"'+(_trOpt==='1'?' selected':'')+'>'+tl('Option 1 — ICN/PUS → ground vehicle direct')+' · USD '+P.tr1+'/person</option><option value="2"'+(_trOpt==='2'?' selected':'')+'>'+tl('Option 2 — ICN → domestic flight → PUS')+' · USD '+P.tr2+'/person</option></select></div>'+
  '<div class="f" style="margin:0;width:160px"><label>'+L('Unofficial training (slots)')+'</label><input id="trslots" type="number" min="0" value="'+(Number(_trSlots)||0)+'" oninput="trSlotsChg(this.value)"></div></div>'+
  '<details style="margin-top:6px"><summary style="cursor:pointer;font-size:12px;color:var(--acc);font-weight:700">'+L('Per-member transport option (optional)')+'</summary><div class="tbl" style="margin-top:6px;max-height:220px;overflow:auto"><table><thead><tr><th>'+L('Name')+'</th><th>'+L('Group')+'</th><th>'+L('Transport')+'</th></tr></thead><tbody>'+(per||'<tr><td colspan="3" class="muted">'+tl('No members.')+'</td></tr>')+'</tbody></table></div></details>'+
  '<p class="muted" style="font-size:11px;margin:6px 0 0">'+L('The Firearms Import/Export Fee is calculated automatically from registered firearms — review the live preview below, then submit your draft.')+' (USD '+P.firearm+'/athlete)</p>';}
function trOptChg(v){_trOpt=v;invcPreviewDraft();}
function trPerChg(id,v){if(v)_trPer[id]=v;else delete _trPer[id];invcPreviewDraft();}
function trSlotsChg(v){_trSlots=v;invcPreviewDraft();}
var _bank=null;

function invoiceDoc(V){var isA=V.status==='approved';var wm=isA?'':'<div class="wm"><span>PENDING<br>APPROVAL</span></div>';var mem=_mem.filter(function(m){return (V.member_ids||[]).indexOf(m.id)>=0});
  return '<div class="doc" id="vi">'+wm+'<header class="dhead"><div class="lh"><img src="assets/logo.png" style="height:46px"><div style="flex:1;text-align:center;font-weight:bold;font-size:13px;line-height:1.35;color:#16456B">Korea Shooting Federation for Disabled<br>Changwon 2026 WSPS World Championships Organising Committee</div><img src="assets/ksfd.png" onerror="this.remove()" style="height:46px"></div></header><div class="dbody">'+
  '<h2 style="font-size:20px;margin:8px 0 2px">INVOICE</h2><p style="text-align:center;font-weight:bold;margin:0 0 10px">Changwon 2026 WSPS World Championships</p>'+

  '<tr><td style="border:none;padding:2px 4px"><b>Address:</b></td><td style="border:none;padding:2px 4px" colspan="3">'+esc(V.addr||addrOf(V.title&&V.title!=='Entire delegation'?V.title:'*ALL*')||'—')+'</td></tr>'+
  '<tr><td style="border:none;padding:2px 4px"><b>DATE</b></td><td style="border:none;padding:2px 4px">'+(isA?dfmt(V.approved_at):'—')+'</td><td style="border:none;padding:2px 4px;text-align:right"><b>Invoice No.</b></td><td style="border:none;padding:2px 4px;text-align:center;font-weight:bold">'+(isA?'CW26INV-'+esc(V.no):'—')+'</td></tr></table>'+
  '<p style="font-size:11px;color:#555;margin:0 0 2px">'+esc(cname(V.country))+' delegation · '+mem.length+' member(s)</p>'+
  itemsToTable((V.items&&V.items.length)?V.items:buildAutoItems(mem))+
  (isA?bankBlockHTML(V):'<p>This is a <b>draft invoice request</b>. Amounts and the <b>Banking Information</b> for payment to the Organizing Committee are entered by the OC upon approval — the final invoice is then issued to your delegation.</p>')+'<div class="dsign"><p style="margin-top:30px">With best regards,</p><p style="margin-top:20px"><b>President</b><br>Korea Shooting Federation for the Disabled</p></div></div><footer class="dfoot"><div class="dft">ZIP 61998 · 8F, Mareukbokgar-ro 154, Seo-gu, Gwangju, Republic of Korea<br>PHONE +82 62 710 5391 / FAX +82 62 710 9851 / ksfd0427@hanmail.net / www.ksfd.kosad.kr</div></footer></div>';}

/* ===== A4 문서: 화면 자동 줌(transform scale) + 탭 확대 모달 · 인쇄는 실 A4 ===== */
var A4W=794,_fitT;
function openDocModal(doc){var ov=document.createElement('div');ov.className='docmback';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
  var x=document.createElement('button');x.className='docmx';x.innerHTML='&times;';x.onclick=function(){ov.remove();};
  var fit=document.createElement('div');fit.className='docfit';
  var clone=doc.cloneNode(true);clone.style.transform='';clone.removeAttribute('id');
  fit.appendChild(clone);ov.appendChild(x);ov.appendChild(fit);document.body.appendChild(ov);
  var avail=Math.min(A4W,(window.innerWidth||A4W)-40),scale=avail/A4W;
  clone.style.transform='scale('+scale+')';fit.style.width=avail+'px';fit.style.height=(clone.offsetHeight*scale)+'px';}
function fitDoc(doc){if(!doc||!doc.parentNode)return;var fit=doc.parentNode;
  if(!(fit.className&&/(^|\s)docfit(\s|$)/.test(fit.className))){
    var w=document.createElement('div');w.className='docfit';doc.parentNode.insertBefore(w,doc);w.appendChild(doc);
    w.addEventListener('click',function(){openDocModal(doc);});fit=w;}
  var host=fit.parentNode,avail=(host&&host.clientWidth)||fit.clientWidth||A4W,scale=Math.min(1,(avail-2)/A4W);
  doc.style.transform='scale('+scale+')';fit.style.height=(doc.offsetHeight*scale)+'px';}
function fitDocsIn(root){root=root||document;if(!root.querySelectorAll)return;var ds=root.querySelectorAll('.doc');
  for(var i=0;i<ds.length;i++){var d=ds[i];if(d.closest&&(d.closest('#pa')||d.closest('.docmback')))continue;fitDoc(d);}}
function scheduleFit(){clearTimeout(_fitT);_fitT=setTimeout(function(){fitDocsIn(document);},50);}
function _fitSetup(){if(window.MutationObserver&&document.body){try{new MutationObserver(scheduleFit).observe(document.body,{childList:true,subtree:true});}catch(e){}}scheduleFit();}
if(document.body)_fitSetup();else window.addEventListener('DOMContentLoaded',_fitSetup);
window.addEventListener('resize',scheduleFit);
function printEl(id){var n=document.getElementById(id);if(!n){alert('No document');return;}$('#pa').innerHTML='<div class="doc">'+n.innerHTML+'</div>';$('#pa').classList.remove('hide');window.print();setTimeout(function(){$('#pa').classList.add('hide')},400);}

async function restoreSession(){
  try{
    if(MOCK){var c=sessionStorage.getItem('cw_npc');if(c){var a=await db.dirGet(c);if(a&&a.active){S.country=c;S.logged=true;scrMain();return true;}}return false;}
    var sess=await sb.auth.getSession();
    if(sess&&sess.data&&sess.data.session&&sess.data.session.user){
      var em=sess.data.session.user.email;var d=em?await db.dirByEmail(em):null;
      if(d&&d.country){S.country=d.country;S.logged=true;scrMain();return true;}}
  }catch(e){}
  return false;}

  if(/type=(invite|recovery|signup)/.test(location.hash)){scrSetPw();}else{restoreSession().then(function(ok){if(!ok)scrCountry();});}
}else{
  restoreSession().then(function(ok){if(!ok)scrCountry();});
}
