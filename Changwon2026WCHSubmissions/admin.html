<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Changwon 2026 · OC Master Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#EAF1F7;--panel:#fff;--panel2:#F1F6FA;--line:#CBDBE8;--mut:#5D758B;--txt:#13314C;--acc:#1B6FA8;--g:#2E8B57;--y:#E87722;--r:#C94A3D;--navy:#16456B}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
header{background:#7A2E1F;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
header img{height:34px;border-radius:50%}
header h1{font-size:15px;margin:0;color:#fff;font-weight:700}
header .sp{margin-left:auto}
.wrap{max-width:1000px;margin:0 auto;padding:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(19,49,76,.08)}
.card h3{margin:0 0 10px;font-size:15px;color:var(--navy)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{background:var(--acc);color:#fff;border:0;padding:10px 14px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;min-height:40px}
.btn.sec{background:#fff;border:1px solid var(--line);color:var(--txt)}
.btn.g{background:var(--g)} .btn.r{background:var(--r)} .btn.y{background:var(--y)}
header .btn.sec{background:transparent;border-color:rgba(255,255,255,.4);color:#fff;min-height:0}
input,select{background:#fff;border:1px solid #B7CCDD;color:var(--txt);border-radius:11px;padding:11px 12px;font-size:14px;width:100%;min-height:44px}
label{display:block;color:var(--mut);font-size:11px;margin-bottom:3px}
.f{margin:10px 0}
.muted{color:var(--mut)}
.tag{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px}
.tag.g{background:#DDEEE3;color:#1F6B42}.tag.y{background:#FBE8D8;color:#B4550E}.tag.r{background:#F7DDD9;color:#A93226}
.tbl{overflow:auto;border:1px solid var(--line);border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;white-space:nowrap}
th{background:#7A2E1F;color:#fff;font-weight:600}
.center{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center}
.box{width:380px;max-width:94vw;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px 24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.stat b{font-size:24px;display:block}
.stat span{font-size:11.5px;color:var(--mut)}
.err{color:#C0392B;font-size:12px;margin-top:8px;min-height:14px}
.hide{display:none}
summary{cursor:pointer;padding:8px 0;font-size:13px;font-weight:600}
.flag{height:14px;border:0.5px solid #0003;border-radius:2px;vertical-align:middle}
</style>
</head>
<body>
<header id="hdr" class="hide"><img src="assets/logo.png"><h1>Changwon 2026 · OC Admin</h1><span class="sp"></span><span id="who" style="color:#fff;opacity:.85;font-size:12px"></span> <button class="btn sec" style="padding:6px 10px" onclick="logout()">Logout</button></header>
<div id="app"></div>
<script>
/* MASTER ADMIN — 듀얼 모드.
   · MOCK: Supabase 키 미설정 시 localStorage(cw_mock) 공유 데모.
   · LIVE: 키 설정 시 실DB. 승인→초대메일 발송은 로그인 화면에서 service_role 키를
     입력한 경우에만 동작(키는 세션 메모리에만 보관, 저장/전송하지 않음). */
const SUPABASE_URL = "https://tkdvyxouknhjhaqjrotb.supabase.co";       // <-- Supabase Project URL
const SUPABASE_ANON_KEY = "sb_publishable_vka5Jqtl7JtyzV5BOv9ZcQ_2E5e76Iy";              // <-- anon public key
let sbc=null;try{sbc=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);}catch(e){}
const LIVE = !!(sbc && SUPABASE_URL.indexOf('YOUR-PROJECT')<0 && SUPABASE_ANON_KEY.indexOf('YOUR-ANON')<0);
var SVC_KEY='';var sbAdmin=null; // service_role (런타임 입력, 메모리 전용)
var _S=null;
async function fetchAll(){
  if(!LIVE){_S=mL();return _S;}
  var out={};var ts=['activation_requests','npc_directory','members','invitations','firearms','firearm_submissions','invoices'];
  for(var i=0;i<ts.length;i++){var r=await sbc.from(ts[i]).select('*');out[ts[i]]=r.data||[];}
  out.npc_accounts=out.npc_directory;out.invoices=out.invoices||[];
  _S=out;return out;}
function dataS(){return LIVE?(_S||{npc_accounts:[],activation_requests:[],members:[],invitations:[],firearms:[],firearm_submissions:[],invoices:[]}):mL();}
var ADMIN_ACCOUNTS={'loc_7766':{pw:'142857',role:'Master administrator'}}; // 하위 관리자(loc_xxxx)는 추후 추가
var CUR_ADMIN=null;
var NPCS_MIN={};
function $(s){return document.querySelector(s)}
function esc(v){return (v==null?'':String(v)).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])})}
async function sha(t){var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t+':cw26'));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('')}
function mL(){try{var s=JSON.parse(localStorage.getItem('cw_mock')||'null');if(s){s.activation_requests=s.activation_requests||[];s.outbox=s.outbox||[];return s;}}catch(e){}return {npc_accounts:[],activation_requests:[],outbox:[],members:[],invitations:[],firearms:[],invoices:[],firearm_submissions:[],_seq:1};}
function mS(s){localStorage.setItem('cw_mock',JSON.stringify(s));}
function today(){return new Date().toISOString().slice(0,10)}
function stage(h){$('#app').innerHTML='<div class="wrap">'+h+'</div>'}
function memName(m){var f=(m.first_name||'').trim(),l=(m.last_name||'').trim();if(f||l)return (l.toUpperCase()+' '+f).trim();return m.name||'';}

function scrLogin(){
  $('#hdr').classList.add('hide');
  $('#app').innerHTML='<div class="center"><div class="box"><div style="display:flex;justify-content:center"><img src="assets/logo.png" style="height:64px;border-radius:50%"></div>'+
  '<h2 style="margin:12px 0 2px;text-align:center;font-size:19px">OC Master Admin</h2>'+
  '<p class="muted" style="text-align:center;margin:0 0 14px;font-size:12px">Changwon 2026 WSPS World Championships — 조직위 전용</p>'+
  (LIVE?'<div style="background:#DDEEE3;border:1px solid #2E8B57;border-radius:10px;padding:8px 10px;margin-bottom:12px;font-size:12px"><b style="color:#1F6B42">LIVE</b> <span class="muted">— 실DB 연결됨. 관리자 <b>loc_7766</b> / <b>142857</b> · 초대메일 발송까지 하려면 service key 입력.</span></div>':'<div style="background:#FBE8D8;border:1px solid #E87722;border-radius:10px;padding:8px 10px;margin-bottom:12px;font-size:12px"><b style="color:#B4550E">DEMO</b> <span class="muted">— 마스터 관리자 <b>loc_7766</b> / <b>142857</b> · NPC 화면과 같은 브라우저에서 데이터 공유.</span></div>')+
  '<div class="f"><label>Admin ID</label><input id="aid" placeholder="loc_0000"></div>'+
  '<div class="f"><label>Password</label><input id="pw" type="password"></div>'+
  (LIVE?'<div class="f"><label>Service key (선택 — 초대메일 발송용, 메모리에만 보관)</label><input id="svc" type="password" placeholder="service_role key (optional)"></div>':'')+
  '<button class="btn" style="width:100%;background:#7A2E1F" onclick="doLogin()">Enter</button>'+
  '<div class="err" id="er"></div></div></div>';
  $('#pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
}
function doLogin(){var id=($('#aid').value||'').trim().toLowerCase();var acc=ADMIN_ACCOUNTS[id];if(!acc||acc.pw!==$('#pw').value){$('#er').textContent='Incorrect ID or password.';return;}
  if(LIVE){var k=($('#svc')&&$('#svc').value||'').trim();if(k){SVC_KEY=k;try{sbAdmin=supabase.createClient(SUPABASE_URL,k,{auth:{autoRefreshToken:false,persistSession:false}});}catch(e){sbAdmin=null;}}}
  CUR_ADMIN={id:id,role:acc.role};scrMain();}
function logout(){CUR_ADMIN=null;scrLogin();}

function nextNo(arr,used){var mx=0;arr.forEach(function(x){var n=parseInt(x.no,10);if(n>mx)mx=n});return String(mx+1).padStart(3,'0');}
function flagTd(c){return '<b>'+esc(c)+'</b>';}

async function scrMain(){
  if(!CUR_ADMIN){scrLogin();return;}
  $('#hdr').classList.remove('hide');
  $('#who').textContent=CUR_ADMIN.id+' · '+CUR_ADMIN.role+(LIVE?' · LIVE':' · MOCK');
  var s=await fetchAll();
  var pInv=s.invitations.filter(function(x){return x.status!=='approved'}).length;
  var pF=s.firearm_submissions.filter(function(x){return x.status!=='approved'}).length;
  var pV=(s.invoices||[]).filter(function(x){return x.status!=='approved'}).length;
  var pA=(s.activation_requests||[]).filter(function(x){return x.status==='pending'}).length;
  var aqRows=(s.activation_requests||[]).slice().reverse().map(function(r){return '<tr><td>'+flagTd(r.country)+'</td><td>'+esc(r.email)+'</td><td>'+esc(r.requested_at||'')+'</td><td>'+(r.status==='pending'?'<span class="tag y">pending</span>':r.status==='approved'?'<span class="tag g">approved</span>':'<span class="tag r">rejected</span>')+'</td><td>'+(r.status==='pending'?'<button class="btn g" style="padding:4px 9px;font-size:11px" onclick="aprAct('+r.id+',true)">Approve</button> <button class="btn r" style="padding:4px 9px;font-size:11px" onclick="aprAct('+r.id+',false)">Reject</button>':'')+'</td></tr>';}).join('');
  var invRows=s.invitations.map(function(L){var mem=s.members.filter(function(m){return (L.member_ids||[]).indexOf(m.id)>=0});
    return '<tr><td>'+flagTd(L.country)+'</td><td>'+esc(L.title)+'</td><td>'+mem.length+'</td><td>'+(L.status==='approved'?'<span class="tag g">approved</span>':'<span class="tag y">pending</span>')+'</td><td>'+(L.no?esc(L.no):'—')+'</td><td>'+esc(L.approved_at||'—')+'</td><td>'+(L.status==='approved'?'<button class="btn r" style="padding:4px 9px;font-size:11px" onclick="revokeInv('+L.id+')">Revoke</button>':'<button class="btn g" style="padding:4px 9px;font-size:11px" onclick="approveInv('+L.id+')">Approve</button>')+' <button class="btn sec" style="padding:4px 9px;font-size:11px" onclick="detInv('+L.id+')">Detail</button></td></tr>';}).join('');
  var fRows=s.firearm_submissions.map(function(x,i){var sc=(x.grp||'*ALL*');
    return '<tr><td>'+flagTd(x.country)+'</td><td>'+esc(sc==='*ALL*'?'Entire delegation':sc)+'</td><td>'+esc(x.submitted_at||'')+'</td><td>'+(x.status==='approved'?'<span class="tag g">approved</span>':'<span class="tag y">pending</span>')+'</td><td>'+(x.no?esc(x.no):'—')+'</td><td>'+(x.status==='approved'?'<button class="btn r" style="padding:4px 9px;font-size:11px" onclick="revokeF('+i+')">Revoke</button>':'<button class="btn g" style="padding:4px 9px;font-size:11px" onclick="approveF('+i+')">Approve</button>')+' <button class="btn sec" style="padding:4px 9px;font-size:11px" onclick="detF('+i+')">Detail</button></td></tr>';}).join('');
  var vRows=(s.invoices||[]).map(function(V){
    return '<tr><td>'+flagTd(V.country)+'</td><td>'+esc(V.title)+'</td><td>'+(V.member_ids||[]).length+'</td><td>'+(V.status==='approved'?'<span class="tag g">approved</span>':'<span class="tag y">pending</span>')+'</td><td>'+(V.no?esc(V.no):'—')+'</td><td>'+esc(V.account||'—')+'</td><td>'+(V.status==='approved'?'<button class="btn r" style="padding:4px 9px;font-size:11px" onclick="revokeV('+V.id+')">Revoke</button>':'<button class="btn g" style="padding:4px 9px;font-size:11px" onclick="approveV('+V.id+')">Approve</button>')+'</td></tr>';}).join('');
  var aRows=s.npc_accounts.map(function(a){return '<tr><td>'+flagTd(a.country)+'</td><td>'+esc(a.email||'')+'</td><td>'+(a.active?'<span class="tag g">active</span>':'<span class="tag y">inactive</span>')+'</td><td><button class="btn y" style="padding:4px 9px;font-size:11px" onclick="sendResetMail(\''+a.country+'\')">Send reset link</button></td></tr>';}).join('');
  var rosterRows=s.members.map(function(m){return '<tr><td>'+flagTd(m.country)+'</td><td>'+esc(memName(m))+'</td><td>'+esc(m.position||'')+'</td><td>'+esc(m.sub_group||'')+'</td><td>'+esc(m.passport||'')+'</td><td>'+esc(m.arrive||'')+' ~ '+esc(m.depart||'')+'</td><td>'+esc(m.room||'')+'</td><td>'+esc(m.wheelchair||'')+'</td></tr>';}).join('');
  stage(
   '<div class="card"><h3>Overview</h3><div class="stats">'+
   '<div class="stat"><b style="color:#B4550E">'+pInv+'</b><span>초청장 승인 대기</span></div>'+
   '<div class="stat"><b style="color:#B4550E">'+pF+'</b><span>총기 확인서 승인 대기</span></div>'+
   '<div class="stat"><b style="color:#B4550E">'+pV+'</b><span>인보이스 승인 대기</span></div>'+
   '<div class="stat"><b style="color:#A93226">'+pA+'</b><span>계정 활성화 요청</span></div>'+
   '</div><p class="muted" style="font-size:11.5px;margin:10px 0 0">Approve 시 문서번호와 승인일이 자동 부여되며, NPC 화면의 문서에 즉시 반영됩니다. 인보이스는 승인 시 가상계좌번호를 입력합니다.</p></div>'+
   '<div class="card"><details open><summary>0. Account activation requests</summary><div class="tbl" style="margin-top:6px"><table><thead><tr><th>NPC</th><th>Email</th><th>Requested</th><th>Status</th><th>Action</th></tr></thead><tbody>'+(aqRows||'<tr><td colspan="5" class="muted">None.</td></tr>')+'</tbody></table></div><p class="muted" style="font-size:11.5px;margin:8px 0 0">승인 시 비밀번호 세팅 링크가 등록 이메일로 발송됩니다(데모: NPC 화면 Inbox(demo)에서 확인). 공식 연맹 연락처와 대조 후 승인하세요.</p></details></div>'+
   '<div class="card"><details open><summary>1. Invitation letters</summary><div class="tbl" style="margin-top:6px"><table><thead><tr><th>NPC</th><th>Title</th><th>Members</th><th>Status</th><th>No.</th><th>Approved</th><th>Action</th></tr></thead><tbody>'+(invRows||'<tr><td colspan="7" class="muted">None.</td></tr>')+'</tbody></table></div></details></div>'+
   '<div class="card"><details open><summary>2. Firearm submission confirmations</summary><div class="tbl" style="margin-top:6px"><table><thead><tr><th>NPC</th><th>Scope</th><th>Submitted</th><th>Status</th><th>No.</th><th>Action</th></tr></thead><tbody>'+(fRows||'<tr><td colspan="6" class="muted">None.</td></tr>')+'</tbody></table></div></details></div>'+
   '<div class="card"><details open><summary>3. Invoices</summary><div class="tbl" style="margin-top:6px"><table><thead><tr><th>NPC</th><th>To</th><th>Members</th><th>Status</th><th>No.</th><th>Account</th><th>Action</th></tr></thead><tbody>'+(vRows||'<tr><td colspan="7" class="muted">None.</td></tr>')+'</tbody></table></div></details></div>'+
   '<div class="card"><details><summary>NPC accounts</summary><div class="tbl" style="margin-top:6px"><table><thead><tr><th>NPC</th><th>Email</th><th>Status</th><th>Action</th></tr></thead><tbody>'+(aRows||'<tr><td colspan="4" class="muted">None.</td></tr>')+'</tbody></table></div></details></div>'+
   '<div class="card"><details><summary>All delegations roster ('+s.members.length+')</summary><div class="tbl" style="margin-top:6px"><table><thead><tr><th>NPC</th><th>Name</th><th>Position</th><th>Group</th><th>Passport</th><th>Stay</th><th>Room</th><th>WC</th></tr></thead><tbody>'+(rosterRows||'<tr><td colspan="8" class="muted">None.</td></tr>')+'</tbody></table></div></details></div>'+
   '<div class="card" id="det" class="hide"></div>');
}
async function approveInv(id){var s=dataS();var L=s.invitations.find(function(x){return x.id===id});if(!L)return;var no=prompt('문서번호 (숫자)',nextNo(s.invitations));if(no==null)return;
  if(LIVE){await sbc.from('invitations').update({no:no,status:'approved',approved_at:today()}).eq('id',id);}else{L.no=no;L.status='approved';L.approved_at=today();mS(s);}scrMain();}
async function revokeInv(id){var s=dataS();var L=s.invitations.find(function(x){return x.id===id});if(!L)return;if(!confirm('승인을 취소할까요?'))return;
  if(LIVE){await sbc.from('invitations').update({status:'pending',no:'',approved_at:''}).eq('id',id);}else{L.status='pending';L.no='';L.approved_at='';mS(s);}scrMain();}
async function approveF(i){var s=dataS();var x=s.firearm_submissions[i];if(!x)return;var no=prompt('확인서 번호 (숫자)',nextNo(s.firearm_submissions));if(no==null)return;
  if(LIVE){await sbc.from('firearm_submissions').update({no:no,status:'approved',approved_at:today()}).eq('country',x.country).eq('grp',x.grp||'*ALL*');}else{x.no=no;x.status='approved';x.approved_at=today();mS(s);}scrMain();}
async function revokeF(i){var s=dataS();var x=s.firearm_submissions[i];if(!x)return;if(!confirm('승인을 취소할까요?'))return;
  if(LIVE){await sbc.from('firearm_submissions').update({status:'pending',no:'',approved_at:''}).eq('country',x.country).eq('grp',x.grp||'*ALL*');}else{x.status='pending';x.no='';x.approved_at='';mS(s);}scrMain();}
async function approveV(id){var s=dataS();var V=(s.invoices||[]).find(function(x){return x.id===id});if(!V)return;var no=prompt('인보이스 번호 (숫자)',nextNo(s.invoices||[]));if(no==null)return;var acct=prompt('납부용 가상계좌번호 (Banking Information에 기재)','140-013-'+Math.floor(100000+Math.random()*900000));if(acct==null)return;
  if(LIVE){await sbc.from('invoices').update({no:no,account:acct,status:'approved',approved_at:today()}).eq('id',id);}else{V.no=no;V.account=acct;V.status='approved';V.approved_at=today();mS(s);}scrMain();}
async function revokeV(id){var s=dataS();var V=(s.invoices||[]).find(function(x){return x.id===id});if(!V)return;if(!confirm('승인을 취소할까요?'))return;
  if(LIVE){await sbc.from('invoices').update({status:'pending',no:'',account:'',approved_at:''}).eq('id',id);}else{V.status='pending';V.no='';V.account='';V.approved_at='';mS(s);}scrMain();}
async function aprAct(id,ok){var s=dataS();var r=(s.activation_requests||[]).find(function(x){return x.id===id});if(!r)return;
  if(!ok){if(!confirm(r.country+' 활성화 요청을 반려할까요?'))return;
    if(LIVE){await sbc.from('activation_requests').update({status:'rejected',decided_at:new Date().toISOString()}).eq('id',id);}
    else{r.status='rejected';r.decided_at=today();mS(s);}scrMain();return;}
  if(LIVE){
    if(!sbAdmin){alert('초대 메일을 보내려면 로그인 화면에서 service key를 입력해야 합니다.\n(승인 상태만 기록하려면 확인을 다시 누르세요)');if(!confirm(r.country+' — 메일 발송 없이 승인 상태만 기록할까요?'))return;
      await sbc.from('activation_requests').update({status:'approved',decided_at:new Date().toISOString()}).eq('id',id);scrMain();return;}
    if(!confirm(r.country+' 승인 — '+r.email+' 로 비밀번호 세팅 초대 메일을 보낼까요?'))return;
    var inv=await sbAdmin.auth.admin.inviteUserByEmail(r.email);
    if(inv.error&&inv.error.message.indexOf('already')<0){alert('초대 실패: '+inv.error.message);return;}
    var uid=(inv.data&&inv.data.user&&inv.data.user.id)||null;
    await sbc.from('activation_requests').update({status:'approved',decided_at:new Date().toISOString()}).eq('id',id);
    await sbAdmin.from('npc_directory').upsert({country:r.country,email:r.email,user_id:uid,active:false});
    alert('승인 완료 — 초대 메일 발송: '+r.email);scrMain();return;}
  r.status='approved';r.decided_at=today();s._seq=(s._seq||1)+2;
  s.outbox.push({id:s._seq,to:r.email,country:r.country,kind:'setup',token:'tk_'+s._seq+'_'+Math.random().toString(36).slice(2,10),sent_at:new Date().toISOString().slice(0,16).replace('T',' '),used:false});
  mS(s);alert('승인 완료 — 비밀번호 세팅 링크 발송.\n(데모: NPC 화면의 Inbox (demo)에서 링크를 열어 확인)');scrMain();}
async function sendResetMail(c){var s=dataS();var a=s.npc_accounts.find(function(x){return x.country===c});if(!a||!a.email){alert('등록된 이메일이 없습니다.');return;}
  if(!confirm(c+' 등록 이메일('+a.email+')로 비밀번호 리셋 링크를 보낼까요?'))return;
  if(LIVE){var r=await sbc.auth.resetPasswordForEmail(a.email);if(r.error){alert('발송 실패: '+r.error.message);return;}alert('리셋 링크 발송: '+a.email);scrMain();return;}
  s._seq=(s._seq||1)+2;
  s.outbox.push({id:s._seq,to:a.email,country:c,kind:'reset',token:'tk_'+s._seq+'_'+Math.random().toString(36).slice(2,10),sent_at:new Date().toISOString().slice(0,16).replace('T',' '),used:false});
  mS(s);alert('리셋 링크 발송(데모: NPC 화면 Inbox (demo)).');scrMain();}
function detInv(id){var s=dataS();var L=s.invitations.find(function(x){return x.id===id});if(!L)return;var mem=s.members.filter(function(m){return (L.member_ids||[]).indexOf(m.id)>=0});
  var el=$('#det');el.classList.remove('hide');el.innerHTML='<h3>'+esc(L.country)+' — '+esc(L.title)+'</h3><div class="tbl"><table><thead><tr><th>Name</th><th>Position</th><th>DOB</th><th>Passport</th><th>Stay</th></tr></thead><tbody>'+mem.map(function(m){return '<tr><td>'+esc(memName(m))+'</td><td>'+esc(m.position||'')+'</td><td>'+esc(m.dob||'')+'</td><td>'+esc(m.passport||'')+'</td><td>'+esc(m.arrive||'')+' ~ '+esc(m.depart||'')+'</td></tr>'}).join('')+'</tbody></table></div>';el.scrollIntoView===undefined;}
function detF(i){var s=dataS();var x=s.firearm_submissions[i];if(!x)return;var sc=(x.grp||'*ALL*');
  var list=s.firearms.filter(function(g){if(g.country!==x.country)return false;if(sc==='*ALL*')return true;var m=s.members.find(function(mm){return mm.country===g.country&&(memName(mm)===g.owner||mm.name===g.owner)});return m&&(((m.sub_group||'').trim())||'(Ungrouped)')===sc;});
  var el=$('#det');el.classList.remove('hide');el.innerHTML='<h3>'+esc(x.country)+' — firearms ('+esc(sc)+')</h3><div class="tbl"><table><thead><tr><th>Owner</th><th>Manufacturer</th><th>Model</th><th>Serial</th><th>Type</th><th>Caliber</th><th>Photos</th></tr></thead><tbody>'+list.map(function(g){return '<tr><td>'+esc(g.owner)+'</td><td>'+esc(g.manufacturer)+'</td><td>'+esc(g.model)+'</td><td>'+esc(g.serial)+'</td><td>'+esc(g.type)+'</td><td>'+esc(g.caliber)+'</td><td>'+((g.photo_full&&g.photo_num)?'2/2':'incomplete')+'</td></tr>'}).join('')+'</tbody></table></div>';}
scrLogin();
