<style>
:root{--bg:#EAF1F7;--panel:#fff;--panel2:#F1F6FA;--line:#CBDBE8;--mut:#5D758B;--txt:#13314C;--acc:#1B6FA8;--g:#2E8B57;--y:#E87722;--r:#C94A3D;--navy:#16456B}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
header{background:#7A2E1F;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}

.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(19,49,76,.08)}
.card h3{margin:0 0 10px;font-size:15px;color:var(--navy)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{background:var(--acc);color:#fff;border:0;padding:10px 14px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;min-height:40px}
.btn.sec{background:#fff;border:1px solid var(--line);color:var(--txt)}

.f{margin:10px 0}
.muted{color:var(--mut)}
.tag{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px}
.tag.g{background:#DDEEE3;color:#1F6B42}.tag.y{background:#FBE8D8;color:#B4550E}.tag.r{background:#F7DDD9;color:#A93226}
.tbl{overflow:auto;border:1px solid var(--line);border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;white-space:nowrap}
th{background:#7A2E1F;color:#fff;font-weight:600}
.center{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center}
.box{width:380px;max-width:94vw;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px 24px}

.hide{display:none}
summary{cursor:pointer;padding:8px 0;font-size:13px;font-weight:600}
.flag{height:14px;border:0.5px solid #0003;border-radius:2px;vertical-align:middle}

/* top progress bar (real %) */
#pbw{position:fixed;top:0;left:0;right:0;height:4px;z-index:99999;display:none;background:rgba(27,111,168,.12);pointer-events:none}
#pb{height:100%;width:0%;background:linear-gradient(90deg,var(--acc,#1B6FA8),var(--g,#2E8B57));transition:width .15s ease}
#pbt{position:fixed;top:7px;right:8px;z-index:99999;display:none;font-size:10px;font-weight:700;color:var(--acc,#1B6FA8);background:rgba(255,255,255,.9);border:1px solid var(--line,#CBDBE8);padding:1px 7px;border-radius:10px;pointer-events:none}
.doc{background:#fff;color:#111;width:794px;min-height:1123px;box-sizing:border-box;margin:0;padding:46px 54px;border-radius:2px;font-family:"Times New Roman",serif;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.12);display:flex;flex-direction:column;border:1px solid #ddd}.dhead{flex:0 0 auto;background:none}.dbody{flex:1 1 auto;min-height:0;padding:14px 20px 0}.dbody>table,.dbody .fullbleed{margin-left:-20px!important;margin-right:-20px!important;width:calc(100% + 40px)!important}.dfoot{flex:0 0 auto;padding-top:14px}.dfoot .dsign p{margin:2px 0}.dfoot .dsign{margin-bottom:8px}.docrule{border:none;border-top:2.5px solid var(--navy);margin:8px 0 14px}.sigwrap{margin-top:22px}.signame{margin:0;text-align:center;line-height:1.35}.signame b{font-size:23px;font-weight:bold}.sigcluster{position:relative;width:380px;height:112px;margin:10px 10px 0 auto}.sigrole{position:absolute;left:0;top:32px;font-size:20px}.sigbar{position:absolute;left:82px;right:78px;top:58px;border-bottom:1.3px solid #333}.sigimg{position:absolute;left:58px;top:2px;height:99px;pointer-events:none}.sealimg{position:absolute;left:266px;top:2px;height:114px;pointer-events:none}.docno{font-size:11px;color:#444;letter-spacing:.2px;padding-right:16px;white-space:nowrap}.docfit{overflow:hidden;position:relative;margin:0 auto;cursor:zoom-in}.docfit>.doc{transform-origin:top left}.docfit::after{content:'\2922';position:absolute;top:6px;right:8px;background:rgba(22,69,107,.85);color:#fff;font-size:12px;line-height:1;padding:5px 7px;border-radius:14px;pointer-events:none;z-index:6}.docmback .docfit{cursor:default}.docmback .docfit::after{display:none}.docmback{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:120;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:20px}.docmx{position:fixed;top:12px;right:14px;z-index:121;background:#fff;border:none;border-radius:50%;width:38px;height:38px;font-size:20px;line-height:1;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.doc h2{text-align:center;letter-spacing:1px}
.doc table{color:#111;font-size:13px;width:100%;border-collapse:collapse}.doc table th,.doc table td{border:1px solid #999;background:#fff;color:#111;padding:5px 8px;text-align:left}
.wm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5}
.wm span{font-family:"Arial Black",sans-serif;font-size:74px;font-weight:900;color:rgba(214,40,40,.16);letter-spacing:-4px;line-height:.92;text-align:center;border-top:8px solid rgba(214,40,40,.16);border-bottom:8px solid rgba(214,40,40,.16);padding:10px 0;transform:rotate(-28deg) scale(1.1,1.4)}
.lh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.dft{border-top:1px solid #ccc;margin-top:10px;padding-top:10px;font-size:10.5px;color:#777;line-height:1.6}.dftrow1{display:flex;justify-content:space-between;align-items:baseline}.dftaddr{text-align:right}.dftrow2{text-align:right;margin-top:2px}
@media print{body>*{display:none!important}#pa{display:block!important;position:static!important}#pa .doc{transform:none!important;width:794px;box-shadow:none;margin:0 auto;border:none}#pa.multi .doc{display:block!important;overflow:visible!important;min-height:0!important}#pa.multi .dbody{display:block!important}#pa.multi .dhead{break-inside:avoid;break-after:avoid}#pa.multi .dfoot{break-inside:avoid}#pa.multi table{break-inside:auto}#pa.multi thead{display:table-header-group}#pa.multi tr{break-inside:avoid}.docfit{overflow:visible!important;height:auto!important}.docfit::after{display:none}@page{size:A4;margin:0}}
.alayout{display:flex;gap:14px;align-items:flex-start}
.snav{width:192px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;position:sticky;top:66px}
.snb{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;cursor:pointer;font-weight:700;font-size:12.5px;color:var(--txt);text-align:left}
.snb:hover{border-color:var(--acc);color:var(--acc)}
.snb .bdg{background:#FBE8D8;color:#B4550E;border-radius:12px;padding:1px 8px;font-size:11px;font-weight:700}
.amain{flex:1;min-width:0}
.mback{position:fixed;inset:0;background:rgba(10,25,40,.5);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px}
.mback.z2{z-index:80}
.amodal{background:#fff;width:100%;max-width:960px;max-height:90vh;overflow:auto;border-radius:16px;padding:14px 18px 20px;box-shadow:0 10px 40px rgba(0,0,0,.3)}
.mclose{width:36px;height:36px;border-radius:50%;border:1px solid #B7CCDD;background:#fff;font-size:17px;color:#C94A3D;cursor:pointer;font-weight:700}
.board td,.board th{white-space:nowrap}
@media(max-width:720px){.alayout{flex-direction:column}.snav{width:100%;flex-direction:row;flex-wrap:wrap;position:static}.snb{flex:1;min-width:130px}}
.edrow{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:10px;background:#F8FBFD}
.edrow label{font-size:10px}
.edrow input,.edrow select{min-height:38px;padding:7px 10px;font-size:13px}
.edsec{font-size:10.5px;font-weight:700;color:var(--mut);letter-spacing:.4px}
.edsplit{display:flex;gap:14px;align-items:flex-start}
.edleft{flex:1;min-width:380px;display:flex;flex-direction:column}
#edrows{overflow-y:auto;max-height:58vh;padding-right:4px}
.edright{flex:1;min-width:380px;max-height:66vh;overflow-y:auto;background:#EAF1F7;border-radius:12px;padding:12px}
@media(max-width:1020px){.edsplit{flex-direction:column}.edright{max-height:44vh;min-width:0;width:100%}.edleft{min-width:0;width:100%}}
.sngl{font-size:10px;font-weight:800;color:var(--mut);letter-spacing:.6px;margin:10px 2px 0;text-transform:uppercase}
.rvt td,.rvt th{text-align:right}.rvt td:first-child,.rvt th:first-child{text-align:left}
.revm th{white-space:nowrap}
.revm td:first-child,.revm th:first-child{position:sticky;left:0;background:#fff;z-index:1;box-shadow:2px 0 4px rgba(19,49,76,.06)}

.revm .revtot th{background:#E3EDF5 !important;color:#16456B;font-size:12.5px;text-align:right}
.revm .revtot th:first-child{text-align:left}

<body>
<div id="pbw"><div id="pb"></div></div><div id="pbt"></div>
<header id="hdr" class="hide"><img src="assets/logo.png"><h1>Changwon 2026 · OC Admin</h1><span class="sp"></span><span id="who" style="color:#fff;opacity:.85;font-size:12px"></span> <button class="btn sec" style="padding:6px 10px" onclick="logout()">Logout</button></header>
<div id="app"></div>
<div id="pa" class="hide"></div>
<script>
/* MASTER ADMIN — 듀얼 모드.
   · MOCK: Supabase 키 미설정 시 localStorage(cw_mock) 공유 데모.
   · LIVE: 키 설정 시 실DB. 승인→초대메일 발송은 로그인 화면에서 service_role 키를
     입력한 경우에만 동작(키는 세션 메모리에만 보관, 저장/전송하지 않음). */
const SUPABASE_URL = "https://tkdvyxouknhjhaqjrotb.supabase.co";       // <-- Supabase Project URL
const SUPABASE_ANON_KEY = "sb_publishable_vka5Jqtl7JtyzV5BOv9ZcQ_2E5e76Iy";              // <-- anon public key
let sbc=null;try{sbc=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);}catch(e){}
const LIVE = !!(sbc && SUPABASE_URL.indexOf('YOUR-PROJECT')<0 && SUPABASE_ANON_KEY.indexOf('YOUR-ANON')<0);
var SVC_KEY='';var sbAdmin=null; // service_role (런타임 입력, 메모리 전용)
var _S=null;
async function fetchAll(){
  if(!LIVE){_S=mL();return _S;}
  var out={};var ts=['activation_requests','npc_directory','members','invitations','firearms','firearm_submissions','invoices','oc_settings','doc_register','manual_docs'];
  pbStart(ts.length);
  for(var i=0;i<ts.length;i++){var r=await sbc.from(ts[i]).select('*');out[ts[i]]=r.data||[];pbStep();}
  out.npc_accounts=out.npc_directory;out.invoices=out.invoices||[];out.manual_docs=out.manual_docs||[];
  _S=out;return out;}
function dataS(){return LIVE?(_S||{npc_accounts:[],activation_requests:[],members:[],invitations:[],firearms:[],firearm_submissions:[],invoices:[],oc_settings:[],manual_docs:[]}):mL();}
/* 관리자 인증 = service key 단독. ID/비밀번호 없음 — 키 자체가 자격증명이며 sessionStorage에만 보관. */
var CUR_ADMIN=null;
var PORTAL_BASE=(location.origin+location.pathname.replace(/[^/]*$/,'')); // 초대·리셋 링크가 되돌아올 포털 주소(하위 경로 포함)

/* ==== top progress bar: real percentage of processed steps ==== */
var _pbT=1,_pbN=0,_pbHide=null;
function pbSet(p){p=Math.max(0,Math.min(100,Math.round(p)));var b=document.getElementById('pb'),t=document.getElementById('pbt');if(b)b.style.width=p+'%';if(t)t.textContent=p+'%';}
function pbStart(total){_pbT=Math.max(1,total||1);_pbN=0;clearTimeout(_pbHide);var w=document.getElementById('pbw'),t=document.getElementById('pbt');if(w)w.style.display='block';if(t)t.style.display='block';pbSet(0);}
function pbStep(n){_pbN+=(n||1);pbSet(_pbN/_pbT*100);if(_pbN>=_pbT)pbEnd();}
function pbEnd(){pbSet(100);clearTimeout(_pbHide);_pbHide=setTimeout(function(){var w=document.getElementById('pbw'),t=document.getElementById('pbt');if(w)w.style.display='none';if(t)t.style.display='none';},400);}

var NPCS_MIN={};
function $(s){return document.querySelector(s)}
function esc(v){return (v==null?'':String(v)).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])})}
async function sha(t){var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t+':cw26'));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('')}
function mL(){try{var s=JSON.parse(localStorage.getItem('cw_mock')||'null');if(s){s.activation_requests=s.activation_requests||[];s.outbox=s.outbox||[];s.oc_settings=s.oc_settings||[];return s;}}catch(e){}return {npc_accounts:[],activation_requests:[],outbox:[],members:[],invitations:[],firearms:[],invoices:[],firearm_submissions:[],_seq:1};}
function mS(s){localStorage.setItem('cw_mock',JSON.stringify(s));}
function today(){return new Date().toISOString().slice(0,10)}
function fmtKST(v){if(!v)return '';try{var d=new Date(v);if(isNaN(d.getTime()))return String(v).slice(0,16).replace('T',' ');return d.toLocaleString('sv-SE',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(/,\s*/,' ');}catch(e){return String(v).slice(0,16).replace('T',' ');}}
function stage(h){$('#app').innerHTML='<div class="wrap">'+h+'</div>'}
function memName(m){var f=(m.first_name||'').trim(),l=(m.last_name||'').trim();if(f||l)return (l.toUpperCase()+' '+f).trim();return m.name||'';}

function scrLogin(){
  $('#hdr').classList.add('hide');
  $('#app').innerHTML='<div class="center"><div class="box"><div style="display:flex;justify-content:center"><img src="assets/logo.png" style="height:64px;border-radius:50%"></div>'+
  '<h2 style="margin:12px 0 2px;text-align:center;font-size:19px">OC Master Admin</h2>'+
  '<p class="muted" style="text-align:center;margin:0 0 14px;font-size:12px">Changwon 2026 WSPS World Championships — 조직위 전용</p>'+
  (LIVE?'<div style="background:#DDEEE3;border:1px solid #2E8B57;border-radius:10px;padding:8px 10px;margin-bottom:12px;font-size:12px"><b style="color:#1F6B42">LIVE</b> <span class="muted">— 실DB 연결됨. <b>Service key</b>가 관리자 인증 수단입니다 (Supabase → Settings → API Keys → service_role legacy). 키는 이 브라우저 세션 메모리에만 보관됩니다.</span></div>':'<div style="background:#FBE8D8;border:1px solid #E87722;border-radius:10px;padding:8px 10px;margin-bottom:12px;font-size:12px"><b style="color:#B4550E">DEMO</b> <span class="muted">— 로컬 데모 모드. NPC 화면과 같은 브라우저에서 데이터 공유.</span></div>')+
  (LIVE?'<div class="f"><label>Service key (필수)</label><input id="svc" type="password" placeholder="service_role key"></div>':'')+
  '<button class="btn" style="width:100%;background:#7A2E1F" onclick="doLogin()">Enter</button>'+
  '<div class="err" id="er"></div></div></div>';
  if(LIVE){$('#svc').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});$('#svc').focus();}
}
function adminArm(k){SVC_KEY=k;try{sbAdmin=supabase.createClient(SUPABASE_URL,k,{auth:{autoRefreshToken:false,persistSession:false}});sbc=sbAdmin;}catch(e){sbAdmin=null;}CUR_ADMIN={id:'master',role:'Master administrator'};}
async function doLogin(){var er=$('#er');er.textContent='';
  if(!LIVE){CUR_ADMIN={id:'demo',role:'Master administrator (DEMO)'};try{sessionStorage.setItem('cw_adm','1')}catch(e){}scrMain();return;}
  var k=($('#svc')&&$('#svc').value||'').trim();
  if(!k){er.textContent='Service key를 입력하세요.';return;}
  er.textContent='키 확인 중…';
  try{var r=await fetch(SUPABASE_URL+'/auth/v1/admin/users?page=1&per_page=1',{headers:{apikey:k,Authorization:'Bearer '+k}});
    if(!r.ok){er.textContent='유효하지 않은 service key입니다 (HTTP '+r.status+'). service_role(legacy) 키인지 확인하세요.';return;}
  }catch(e){er.textContent='키 확인에 실패했습니다 — 네트워크 상태를 확인하세요.';return;}
  adminArm(k);try{sessionStorage.setItem('cw_svc',k)}catch(e){}scrMain();}
function logout(){CUR_ADMIN=null;SVC_KEY='';sbAdmin=null;try{sessionStorage.removeItem('cw_adm');sessionStorage.removeItem('cw_svc')}catch(e){}scrLogin();}

function nextNo(arr,used){var mx=0;arr.forEach(function(x){var n=parseInt(x.no,10);if(n>mx)mx=n});return String(mx+1).padStart(3,'0');}
function flagTd(c){return '<b>'+esc(c)+'</b>';}

async function scrMain(){
  if(!CUR_ADMIN){scrLogin();return;}
  $('#hdr').classList.remove('hide');
  $('#who').textContent=CUR_ADMIN.id+' · '+CUR_ADMIN.role+(LIVE?' · LIVE':' · MOCK');
  var s=await fetchAll();
  var pInv=s.invitations.filter(function(x){return x.status!=='approved'}).length;
  var pF=s.firearm_submissions.length;
  var pV=(s.invoices||[]).filter(function(x){return x.status!=='approved'}).length;
  var pA=(s.activation_requests||[]).filter(function(x){return x.status==='pending'}).length;
  var aqRows=(s.activation_requests||[]).slice().reverse().map(function(r){return '<tr><td>'+flagTd(r.country)+'</td><td>'+esc(r.email)+'</td><td>'+esc(fmtKST(r.requested_at))+'</td><td>'+(r.status==='pending'?'<span class="tag y">pending</span>':r.status==='approved'?'<span class="tag g">approved</span>':'<span class="tag r">rejected</span>')+'</td><td>'+(r.status==='pending'?'<button class="btn g" style="padding:4px 9px;font-size:11px" onclick="aprAct('+r.id+',true)">Approve</button> <button class="btn r" style="padding:4px 9px;font-size:11px" onclick="aprAct('+r.id+',false)">Reject</button> <button class="btn" style="padding:4px 9px;font-size:11px;background:#5B3E8E" onclick="setPw('+r.id+')">🔑 비번설정</button>':r.status==='approved'?'<button class="btn y" style="padding:4px 9px;font-size:11px" onclick="resendSetup('+r.id+')">Resend link</button> <button class="btn" style="padding:4px 9px;font-size:11px;background:#5B3E8E" onclick="setPw('+r.id+')">🔑 비번설정</button>':'')+'</td></tr>';}).join('');
  var invRows=s.invitations.map(function(L){var mem=s.members.filter(function(m){return (L.member_ids||[]).indexOf(m.id)>=0});

function manualLive(){var el=document.getElementById('md_prev');if(!el)return;try{var m=manualCollect();el.innerHTML='<div style="transform:scale(.68);transform-origin:top left;width:147%;padding:6px">'+manualDocHTML(m)+'</div>';}catch(e){el.innerHTML='<p class="muted" style="padding:10px">미리보기 오류: '+esc(e.message||'')+'</p>';}}
function manualCollect(){
  var rows=(($('#md_rows')&&$('#md_rows').value)||'').split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length;}).map(function(l){return l.split(/\s*\|\s*/);});

function manualDocHTML(m){var p=m.payload||{};var rows=p.rows||[];
  function tb(heads){return '<table style="width:100%;margin:14px 0"><thead><tr>'+heads.map(function(h){return '<th>'+esc(h)+'</th>';}).join('')+'</tr></thead><tbody>'+(rows.length?rows.map(function(r){return '<tr>'+heads.map(function(_x,i){return '<td>'+esc(r[i]||'')+'</td>';}).join('')+'</tr>';}).join(''):'<tr><td colspan="'+heads.length+'" style="color:#888">—</td></tr>')+'</tbody></table>';}
  function pr(t){t=String(t||'').trim();if(!t)return '';return t.split(/\n\n+/).map(function(x){return '<p>'+esc(x).replace(/\n/g,'<br>')+'</p>';}).join('');}

  else if(m.doc_type==='invoice'){var b=bankS(dataS());body='<h2 style="font-size:20px;margin:8px 0 2px">INVOICE</h2><p style="text-align:center;font-weight:bold;margin:0 0 10px">Changwon 2026 WSPS World Championships</p><hr class="docrule">'+pr(p.intro)+tb(['Description','Amount'])+'<div style="border:1px solid #999;padding:9px 12px;margin:10px 0;font-size:12.5px;line-height:1.6"><b>Banking Information</b><br>Bank: '+esc(b.bank)+'<br>SWIFT Code: '+esc(b.swift)+'<br>Account Holder: '+esc(b.holder)+'<br>Account No.: '+esc(p.account||b.account)+'<br>Address: '+esc(b.addr)+'</div>'+pr(p.closing);}
  else if(m.doc_type==='firearms'){body='<h2 style="font-size:19px">CONFIRMATION OF FIREARM SUBMISSION</h2><p style="text-align:center;font-weight:bold">Changwon 2026 WSPS World Championships</p><hr class="docrule">'+pr(p.intro)+tb(['Owner','Manufacturer','Model','Serial No.','Type','Caliber'])+pr(p.closing);}
  else{body=(m.title?'<h2 style="font-size:19px;text-align:center;margin:8px 0">'+esc(m.title)+'</h2><hr class="docrule">':'')+pr(p.intro)+(rows.length?tb(['A','B','C','D','E','F'].slice(0,Math.max(1,(rows[0]||[]).length))):'')+pr(p.closing);}
  return '<div class="doc" id="adm_doc">'+docHeadA()+body+docFootA({sign:true,no:m.reg_no,date:m.issued_at})+'</div>';}
function manualPreview(){var m=manualCollect();docShow('미리보기 · '+esc(TNMANUAL(m.doc_type)),manualDocHTML(m));}

function openRegDoc(i){var r=(_REGVIEW||[])[i];if(!r)return;var s=dataS();var t=r.source_table,k=r.source_key;
  if(t==='invitations'){docInv(parseInt(k,10));return;}

function docNoFmt(n){return n?('Changwon 2026 WSPS World Championships-'+('000'+String(n)).slice(-3)):'';}
async function issueDocno(t,c,ref,tbl,key){try{var r=await sbc.rpc('issue_docno',{p_type:t,p_country:c,p_reference:ref||'',p_source_table:tbl,p_source_key:String(key)});if(r.error){alert('문서번호 발급 실패: '+r.error.message);return null;}return r.data;}catch(e){alert('문서번호 발급 오류');return null;}}
function mockIssue(s,t,c,ref,tbl,key){s.doc_register=s.doc_register||[];var ex=s.doc_register.find(function(r){return r.source_table===tbl&&r.source_key===String(key)});if(ex)return ex.docno;var no=s.doc_register.reduce(function(m,r){return Math.max(m,r.docno||0)},0)+1;s.doc_register.push({docno:no,doc_type:t,country:c,reference:ref||'',source_table:tbl,source_key:String(key),issued_at:today()});return no;}
function showRegister(flt){var s=dataS();var all=(s.doc_register||[]).slice().sort(function(a,b){return (b.docno||0)-(a.docno||0)});var TN={invitation:'초청장',invoice:'인보이스',firearms:'총기확인서',custom:'기타'};var cnt={invitation:0,invoice:0,firearms:0,custom:0};all.forEach(function(r){if(cnt[r.doc_type]!=null)cnt[r.doc_type]++;});var reg=flt?all.filter(function(r){return r.doc_type===flt;}):all;function b(k,label,n){var on=(flt||'')===(k||'');return '<button class="btn '+(on?'':'sec')+'" style="padding:4px 11px;font-size:12px;margin-right:6px" onclick="showRegister('+(k?(String.fromCharCode(39)+k+String.fromCharCode(39)):'')+')">'+label+' <b>'+n+'</b></button>';}var bar=b('','전체',all.length)+b('invitation','초청장',cnt.invitation)+b('invoice','인보이스',cnt.invoice)+b('firearms','총기확인서',cnt.firearms)+b('custom','기타',cnt.custom);_REGVIEW=reg;var rows=reg.map(function(r,ri){return '<tr style="cursor:pointer" onclick="openRegDoc('+ri+')"><td style="font-weight:bold;white-space:nowrap">'+esc(docNoFmt(r.docno))+'</td><td>'+esc(TN[r.doc_type]||r.doc_type)+'</td><td>'+esc(r.country||'')+'</td><td>'+esc(r.reference||'')+'</td><td style="white-space:nowrap">'+esc(String(r.issued_at||'').slice(0,10))+'</td></tr>';}).join('')||'<tr><td colspan="5" class="muted">해당 문서가 없습니다.</td></tr>';infoModal('문서 통합 장부 ('+reg.length+'건)','<div style="margin-bottom:10px">'+bar+'</div><div class="tbl"><table><thead><tr><th>문서번호</th><th>유형</th><th>국가</th><th>참조</th><th>발행일</th></tr></thead><tbody>'+rows+'</tbody></table></div>');}
async function approveInv(id){var s=dataS();var L=s.invitations.find(function(x){return x.id===id});if(!L)return;if(!confirm('이 초청장을 승인하고 문서장부에 등재(번호 자동발급)할까요?'))return;

async function approveV(id){var s=dataS();var V=(s.invoices||[]).find(function(x){return x.id===id});if(!V)return;var no=prompt('인보이스 번호 (숫자)',nextNo(s.invoices||[]));if(no==null)return;var acct=prompt('납부 계좌번호 (Banking Information에 기재 · 기본값=관리 계좌)',bankS(s).account);if(acct==null)return;

async function revokeV(id){var s=dataS();var V=(s.invoices||[]).find(function(x){return x.id===id});if(!V)return;if(!confirm('승인을 취소할까요?'))return;

async function issueF(i){var s=dataS();var x=s.firearm_submissions[i];if(!x)return;var sc=(x.grp||'*ALL*');if(x.reg_no){alert('이미 발행됨: '+docNoFmt(x.reg_no));return;}if(!confirm('총기정보제출확인서를 발행하고 문서장부에 등재할까요?'))return;if(LIVE){var reg=await issueDocno('firearms',x.country,sc,'firearm_submissions',x.country+'/'+sc);if(reg==null)return;await sbc.from('firearm_submissions').update({reg_no:reg,issued_at:today()}).eq('country',x.country).eq('grp',x.grp);}else{x.reg_no=mockIssue(s,'firearms',x.country,sc,'firearm_submissions',x.country+'/'+sc);x.issued_at=today();mS(s);}scrMain();}
async function findUserByEmail(email){try{var r=await sbAdmin.auth.admin.listUsers({page:1,perPage:200});var us=(r.data&&r.data.users)||[];var f=us.find(function(u){return (u.email||'').toLowerCase()===String(email).toLowerCase();});return f?f.id:null;}catch(e){return null;}}
async function setPw(id){
  var s=dataS();var r=(s.activation_requests||[]).find(function(x){return x.id===id;});if(!r)return;
  if(!LIVE){alert('이 기능은 LIVE 모드 전용입니다.');return;}
  if(!sbAdmin){alert('로그인 화면에서 service key를 입력해야 사용할 수 있습니다.');return;}
  var pw=prompt(r.country+' ('+r.email+')\n\n이 계정에 설정할 비밀번호를 입력하세요 (최소 6자).\n설정 후 이 비밀번호를 해당 국가 담당자에게 직접 전달하시면 됩니다.','');
  if(pw===null)return;pw=pw.trim();if(pw.length<6){alert('비밀번호는 최소 6자 이상이어야 합니다.');return;}
  var dir=(s.npc_directory||[]).find(function(x){return x.country===r.country;});
  var uid=(dir&&dir.user_id)||null;
  try{
    if(!uid){uid=await findUserByEmail(r.email);}
    if(uid){var u=await sbAdmin.auth.admin.updateUserById(uid,{password:pw,email_confirm:true});if(u.error)throw u.error;}
    else{var cr=await sbAdmin.auth.admin.createUser({email:r.email,password:pw,email_confirm:true});if(cr.error)throw cr.error;uid=cr.data.user.id;}
    await sbAdmin.from('npc_directory').upsert({country:r.country,email:r.email,user_id:uid,active:true});
    await sbc.from('activation_requests').update({status:'approved',decided_at:new Date().toISOString()}).eq('id',id);
    alert(r.country+' 계정 비밀번호 설정 완료 · Active ✔\n\n[담당자에게 전달할 정보]\n국가: '+r.country+'\n로그인: 포털에서 '+r.country+' 선택 후 아래 비밀번호 입력\n비밀번호: '+pw);
    scrMain();
  }catch(e){alert('비밀번호 설정 실패: '+((e&&e.message)||JSON.stringify(e)));}
}

async function aprAct(id,ok){var s=dataS();var r=(s.activation_requests||[]).find(function(x){return x.id===id});if(!r)return;
  if(!ok){if(!confirm(r.country+' 활성화 요청을 반려할까요?'))return;
    if(LIVE){await sbc.from('activation_requests').update({status:'rejected',decided_at:new Date().toISOString()}).eq('id',id);}
    else{r.status='rejected';r.decided_at=today();mS(s);}scrMain();return;}
  if(LIVE){
    if(!sbAdmin){alert('초대 메일을 보내려면 로그인 화면에서 service key를 입력해야 합니다.\n(승인 상태만 기록하려면 확인을 다시 누르세요)');if(!confirm(r.country+' — 메일 발송 없이 승인 상태만 기록할까요?'))return;
      await sbc.from('activation_requests').update({status:'approved',decided_at:new Date().toISOString()}).eq('id',id);scrMain();return;}
    if(!confirm(r.country+' 승인 — '+r.email+' 로 비밀번호 세팅 초대 메일을 보낼까요?'))return;
    var inv=await sbAdmin.auth.admin.inviteUserByEmail(r.email,{redirectTo:PORTAL_BASE});
    if(inv.error&&String(inv.error.message||'').indexOf('already')<0){var st=inv.error.status||inv.error.code||'?';var hint=(String(st)==='500'||!inv.error.message)?'\n\n원인은 대개 SMTP 설정 미완료입니다. Supabase → Authentication → Emails → SMTP Settings 에서 Password(Gmail 앱 비밀번호)를 입력·저장하거나, Custom SMTP를 끄세요.':'';alert('초대 실패 (status '+st+'): '+(inv.error.message||JSON.stringify(inv.error))+hint);return;}
    var uid=(inv.data&&inv.data.user&&inv.data.user.id)||null;
    await sbc.from('activation_requests').update({status:'approved',decided_at:new Date().toISOString()}).eq('id',id);
    await sbAdmin.from('npc_directory').upsert({country:r.country,email:r.email,user_id:uid,active:false});
    alert('승인 완료 — 초대 메일 발송: '+r.email);scrMain();return;}
  r.status='approved';r.decided_at=today();s._seq=(s._seq||1)+2;
  s.outbox.push({id:s._seq,to:r.email,country:r.country,kind:'setup',token:'tk_'+s._seq+'_'+Math.random().toString(36).slice(2,10),sent_at:new Date().toISOString().slice(0,16).replace('T',' '),used:false});

async function resetCountry(c){
  if(!confirm('['+c+'] 국가의 계정과 모든 귀속 데이터(명단·초청장·총기·인보이스·활성화 요청·항공일정·주소)를 삭제합니다.\n디버깅용 기능입니다. 계속할까요?'))return;
  if(!confirm('정말로 삭제합니까? 이 작업은 되돌릴 수 없습니다.'))return;
  if(LIVE){
    var d=(dataS().npc_directory||[]).find(function(x){return x.country===c});var uid=d?d.user_id:null;
    var ts=['members','invitations','firearms','firearm_submissions','invoices','invoice_addresses','group_flights','activation_requests','npc_directory'];
    pbStart(ts.length+1);
    for(var i=0;i<ts.length;i++){await sbc.from(ts[i]).delete().eq('country',c);pbStep();}
    try{var ls=await sbc.storage.from('firearms').list(c,{limit:1000});if(ls&&ls.data&&ls.data.length){await sbc.storage.from('firearms').remove(ls.data.map(function(o2){return c+'/'+o2.name}));}}catch(e){}
    if(uid&&sbAdmin){try{await sbAdmin.auth.admin.deleteUser(uid);}catch(e){}}
    else if(uid){alert('참고: Auth 로그인 계정 삭제는 service key로 로그인한 경우에만 가능합니다. (데이터는 모두 삭제됨)');}
    pbStep();
  }else{
    var s=mL();['members','invitations','firearms','invoices','activation_requests','npc_accounts','firearm_submissions','invoice_addresses','group_flights'].forEach(function(k){if(s[k])s[k]=s[k].filter(function(x){return x.country!==c});});
    s.outbox=(s.outbox||[]).filter(function(x){return x.country!==c});mS(s);
  }
  alert('['+c+'] 리셋 완료.');scrMain();}
async function resendSetup(id){var s=dataS();var r=(s.activation_requests||[]).find(function(x){return x.id===id});if(!r)return;
  if(!confirm(r.country+' — '+r.email+' 로 비밀번호 세팅 링크를 다시 보낼까요?'))return;
  if(!LIVE){s._seq=(s._seq||1)+2;
    s.outbox.push({id:s._seq,to:r.email,country:r.country,kind:'setup',token:'tk_'+s._seq+'_'+Math.random().toString(36).slice(2,10),sent_at:new Date().toISOString().slice(0,16).replace('T',' '),used:false});
    mS(s);alert('재발송 완료(데모: NPC 화면 Inbox (demo)).');scrMain();return;}
  var d=(s.npc_directory||[]).find(function(x){return x.country===r.country});

    if(rr.error){alert('발송 실패: '+rr.error.message);return;}
    alert('비밀번호 세팅 링크 재발송 완료: '+r.email);return;}
  if(!sbAdmin){alert('이 계정은 최초 초대가 아직 발송되지 않았습니다.\nservice key로 로그인한 뒤 다시 시도하세요.');return;}
  var inv=await sbAdmin.auth.admin.inviteUserByEmail(r.email,{redirectTo:PORTAL_BASE});
  if(inv.error&&String(inv.error.message||'').indexOf('already')<0){var st=inv.error.status||inv.error.code||'?';var hint=(String(st)==='500'||!inv.error.message)?'\n\n원인은 대개 SMTP 설정 미완료입니다. Supabase → Authentication → Emails → SMTP Settings 에서 Password(Gmail 앱 비밀번호)를 입력·저장하거나, Custom SMTP를 끄세요.':'';alert('초대 실패 (status '+st+'): '+(inv.error.message||JSON.stringify(inv.error))+hint);return;}
  var uid=(inv.data&&inv.data.user&&inv.data.user.id)||null;
  await sbAdmin.from('npc_directory').upsert({country:r.country,email:r.email,user_id:uid,active:false});
  alert('초대 재발송 완료: '+r.email);scrMain();}
